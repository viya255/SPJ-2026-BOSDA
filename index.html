        // Fungsi untuk menyimpan data saat tombol diklik
        function simpanData() {
          const nama = document.getElementById("inputNamaSekolah").value;
          const nominal = document.getElementById("inputAnggaran").value;

          db.collection("data_spj").add({
            sekolah: nama,
            anggaran: parseInt(nominal),
            tanggal: new Date().toISOString()
          })
          .then(() => {
            alert("Data berhasil tersimpan di Firebase!");
          })
          .catch((error) => {
            console.error("Gagal menyimpan: ", error);
          });
        }
        // Tambahkan fungsi ini di dalam tag <script>
        function tampilkanDataKeTabel() {
          const tbody = document.getElementById("tabelBody");
  
       // Mengambil data dari Firestore
          db.collection("data_spj").get().then((querySnapshot) => {
       // Kosongkan tabel dulu
            tbody.innerHTML = ""; 
    
            querySnapshot.forEach((doc) => {
              const data = doc.data();
      // Menambah baris ke dalam tabel HTML
              tbody.innerHTML += `
                <tr>
                  <td class="p-2 border">${data.sekolah}</td>
                  <td class="p-2 border">${data.anggaran}</td>
                </tr>
              `;
            });
          });
        }

      // Panggil fungsi ini saat halaman dimuat
        window.onload = tampilkanDataKeTabel;

        function tampilkanData() {

            });

        }

        setTimeout(function() {
        console.log("Mencoba mengambil data...");
        tampilkanDataKeTabel();
        }, 1000);

    // Ambil nomor sekolah dari nama, misal "UPT SDN 52 GRESIK" -> "52"
    function getSchoolNumber(name) {
        if (!name) return null;
        const m = name.match(/\b(\d+)\b/);
        return m ? m[1] : null;
    }

    // Ambil info pagu untuk sekolah+rincian+triwulan tertentu
    function getPaguInfo(sekolah, rincian, triwulan) {
        const num = getSchoolNumber(sekolah);
        if (!num || !RAK_DATA[num]) return null;
        const kode = rincian.split(' ')[0];
        if (!RAK_DATA[num][kode]) return null;
        const twNum = triwulan.replace('Triwulan ', '');
        return {
            total: RAK_DATA[num][kode]['t'] || 0,
            triwulan: RAK_DATA[num][kode][twNum] || 0,
            kode: kode
        };
    }

        const RINCIAN_OPTIONS = [

        // --- CUSTOM COMBOBOX (dari kamu, tidak diubah) ---
        const CustomComboBox = ({ name, value, defaultValue, onChange, options, placeholder, required, className }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [inputValue, setInputValue] = useState(value !== undefined ? value : (defaultValue || ''));
            const [isTyping, setIsTyping] = useState(false);
            const wrapperRef = useRef(null);
            useEffect(() => { if (value !== undefined) setInputValue(value); }, [value]);
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) { setIsOpen(false); setIsTyping(false); }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);
            const displayOptions = isTyping && inputValue ? options.filter(opt => opt.toLowerCase().includes(inputValue.toLowerCase())) : options;
            return (
                <div ref={wrapperRef} className="relative w-full">
                    <input type="text" name={name} value={inputValue}
                        onChange={(e) => { setInputValue(e.target.value); setIsTyping(true); setIsOpen(true); if (onChange) onChange(e); }}
                        onFocus={() => { setIsOpen(true); setIsTyping(false); }}

        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

        // =====================================================
        // KOMPONEN BARU: KARTU INFO PAGU RAK
        // Ditempatkan di antara field Nominal/Triwulan dan tombol Simpan
        // =====================================================
        const PaguInfoCard = ({ sekolah, rincian, triwulan, nominalInput, dataSpj }) => {
            if (!sekolah || !rincian || !triwulan) return null;

            const paguInfo = getPaguInfo(sekolah, rincian, triwulan);

            // Jika data tidak ditemukan di RAK
            if (!paguInfo) return (
                <div className="p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-500 italic flex items-center gap-2">
                    <IconInfo size={15} className="text-gray-400 flex-shrink-0"/>
                    <span>Data pagu RAK tidak ditemukan untuk kombinasi ini.</span>
                </div>
            );

            // Hitung SPJ yg sudah diajukan (Menunggu Verifikasi + Siap Cair) untuk sekolah+rincian+triwulan ini
            const kodeBelanja = rincian.split(' ')[0];
            const sudahDiajukan = dataSpj
                .filter(s => {
                    const sNum = s.sekolah ? s.sekolah.match(/\b(\d+)\b/)?.[1] : null;
                    const myNum = sekolah ? sekolah.match(/\b(\d+)\b/)?.[1] : null;
                    const sKode = s.rincian ? s.rincian.split(' ')[0] : '';
                    return sNum === myNum && sKode === kodeBelanja && s.triwulan === triwulan
                        && (s.status === 'Menunggu Verifikasi' || s.status === 'Siap Cair');
                })
                .reduce((acc, s) => acc + (Number(s.nominal) || 0), 0);

            const sisaPaguTw = paguInfo.triwulan - sudahDiajukan;
            const sisaPaguTotal = paguInfo.total - sudahDiajukan;
            const inputNominal = Number(nominalInput) || 0;
            const twHasNoPagu = paguInfo.triwulan === 0;
            const isOverBudget = inputNominal > 0 && (inputNominal > sisaPaguTw || inputNominal > sisaPaguTotal);

            // Tentukan warna kartu
            const cardBg   = isOverBudget ? 'bg-red-50 border-red-200'   : twHasNoPagu ? 'bg-amber-50 border-amber-200'   : 'bg-green-50 border-green-200';
            const headBg   = isOverBudget ? 'bg-red-100 border-red-200'  : twHasNoPagu ? 'bg-amber-100 border-amber-200'  : 'bg-green-100 border-green-200';
            const headText = isOverBudget ? 'text-red-700'               : twHasNoPagu ? 'text-amber-700'               : 'text-green-700';
            const HeadIcon = isOverBudget ? IconWarning                  : IconInfo;
            const headIconColor = isOverBudget ? 'text-red-600' : twHasNoPagu ? 'text-amber-600' : 'text-green-600';

            // Nama sekolah singkat untuk judul kartu
            const namaSekolah = sekolah.replace('UPT SDN ', 'SDN ').replace(' GRESIK', '');

            return (
                <div className={`border rounded-xl overflow-hidden shadow-sm ${cardBg}`}>
                    {/* Header kartu */}
                    <div className={`px-4 py-2.5 flex items-center gap-2 border-b ${headBg}`}>
                        <HeadIcon size={15} className={`${headIconColor} flex-shrink-0`}/>
                        <span className={`text-sm font-bold ${headText}`}>
                            Info Pagu ({namaSekolah}) — {triwulan}
                        </span>
                    </div>

                    {/* Isi kartu: grid 2 kolom label : nilai */}
                    <div className="px-4 py-3">
                        <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm">
                            <span className="text-gray-500">Pagu Total (Setahun)</span>
                            <span className="font-semibold text-gray-800 text-right">{formatRupiah(paguInfo.total)}</span>

                            <span className="text-gray-500">Pagu {triwulan}</span>
                            <span className={`font-semibold text-right ${twHasNoPagu ? 'text-amber-600 italic text-xs' : 'text-gray-800'}`}>
                                {twHasNoPagu ? 'Tidak dianggarkan di TW ini' : formatRupiah(paguInfo.triwulan)}
                            </span>

                            <span className="text-gray-500">SPJ Sudah Diajukan</span>
                            <span className={`font-semibold text-right ${sudahDiajukan > 0 ? 'text-orange-600' : 'text-gray-400'}`}>
                                {sudahDiajukan > 0 ? formatRupiah(sudahDiajukan) : '—'}
                            </span>

                            {/* Garis pemisah */}
                            <div className="col-span-2 border-t border-dashed border-gray-300 my-0.5"></div>

                            <span className="text-gray-700 font-medium">Sisa Pagu {triwulan}</span>
                            <span className={`font-bold text-right text-base ${twHasNoPagu ? 'text-amber-600' : sisaPaguTw <= 0 ? 'text-red-600' : 'text-green-700'}`}>
                                {twHasNoPagu ? '—' : formatRupiah(Math.max(0, sisaPaguTw))}
                                {!twHasNoPagu && sisaPaguTw > 0 && <span className="text-green-500 ml-1">✓</span>}
                                {!twHasNoPagu && sisaPaguTw <= 0 && <span className="text-red-500 ml-1">✗</span>}
                            </span>

                            <span className="text-gray-700 font-medium">Sisa Pagu Total</span>
                            <span className={`font-bold text-right ${sisaPaguTotal <= 0 ? 'text-red-600' : 'text-blue-700'}`}>
                                {formatRupiah(Math.max(0, sisaPaguTotal))}
                            </span>
                        </div>

                        {/* Peringatan jika melebihi */}
                        {isOverBudget && inputNominal > 0 && (
                            <div className="mt-2.5 p-2.5 bg-red-100 rounded-lg text-red-700 text-xs font-medium flex items-start gap-1.5">
                                <IconWarning size={13} className="flex-shrink-0 mt-0.5"/>
                                <span>Nominal yang diinput ({formatRupiah(inputNominal)}) <strong>melebihi sisa pagu!</strong> Harap periksa kembali.</span>

                        {twHasNoPagu && (
                            <div className="mt-2.5 p-2.5 bg-amber-100 rounded-lg text-amber-700 text-xs font-medium flex items-start gap-1.5">
                                <IconWarning size={13} className="flex-shrink-0 mt-0.5"/>
                                <span>Rincian ini <strong>tidak dianggarkan</strong> pada {triwulan}. Pastikan triwulan sudah benar.</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- DATA AWAL ---
        const initialData = [];

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [dataSpj, setDataSpj] = useState(initialData);
          const [isLoading, setIsLoading] = useState(false);
          const [addForm, setAddForm] = useState({ kecamatan: '', sekolah: '', rincian: '', nominal: '', triwulan: 'Triwulan 1' });
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [selectedSpj, setSelectedSpj] = useState(null);
          const [verdict, setVerdict] = useState('Siap Cair');
          const [notes, setNotes] = useState('');
          const [isEditModalOpen, setIsEditModalOpen] = useState(false);
          const [editingSpj, setEditingSpj] = useState(null);
          const [draggedId, setDraggedId] = useState(null);
          const [aksesPic, setAksesPic] = useState('Semua');

          const stats = {
            total: dataSpj.length,
            menunggu: dataSpj.filter(d => d.status === 'Menunggu Verifikasi').length,
            siapCair: dataSpj.filter(d => d.status === 'Siap Cair').length,
            revisi: dataSpj.filter(d => d.status === 'Revisi').length,
            ditunda: dataSpj.filter(d => d.status === 'Ditunda').length,
          };

          const handleFormChange = (e) => {
            const { name, value } = e.target;
            let newForm = { ...addForm, [name]: value };
            if (name === 'kecamatan') newForm.sekolah = '';
            setAddForm(newForm);
          };

          // --- HANDLE SUBMIT (dari kamu, dengan Google Sheets) ---
          const handleAddNewSpj = async (e) => {
            e.preventDefault();
            setIsLoading(true);
            const newSpj = {
              id: `SPJ-00${dataSpj.length + 1}`,
              kecamatan: addForm.kecamatan, sekolah: addForm.sekolah,
              pic: KECAMATAN_PIC[addForm.kecamatan],
              tanggal: new Date().toISOString().split('T')[0],
              triwulan: addForm.triwulan, rincian: addForm.rincian,
              nominal: Number(addForm.nominal), status: 'Menunggu Verifikasi', catatan: '-'
            };
            try {
              const response = await fetch('https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newSpj),
              });
              if (response.ok) {
                setDataSpj([newSpj, ...dataSpj]);
                setAddForm({ kecamatan: '', sekolah: '', rincian: '', nominal: '', triwulan: 'Triwulan 1' });
                alert('Data berhasil disimpan ke Google Sheets!');
                setActiveTab('verifikasi');
              } else { alert('Gagal menyimpan data.'); }
            } catch (error) { console.error('Error:', error); alert('Terjadi kesalahan saat menyambungkan ke Google Sheets.'); }
            finally { setIsLoading(false); }
          };

          const openVerifyModal = (spj) => { setSelectedSpj(spj); setVerdict('Siap Cair'); setNotes(''); setIsModalOpen(true); };

          const submitVerification = async () => {
            const today = new Date().toISOString().split('T')[0];
            const updatedData = dataSpj.map(spj => spj.id === selectedSpj.id ? { ...spj, status: verdict, catatan: verdict === 'Siap Cair' ? '' : notes, tanggal: today } : spj);
            setDataSpj(updatedData);
            setIsModalOpen(false);
            try {
              await fetch(`https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630/id/${selectedSpj.id}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: verdict, catatan: verdict === 'Siap Cair' ? '' : notes, tanggal: today }),
              });
              alert('Status di Sheets berhasil diperbarui!');
            } catch (error) { alert('Status di aplikasi berubah, tapi gagal sinkron ke Sheets.'); }
          };

          const handleDeleteSpj = async (id) => {
            if (!window.confirm('Yakin ingin hapus ID: ' + id + '?')) return;
            try {
              const response = await fetch(`https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630/id/${id}`, { method: 'DELETE' });
              const text = await response.text();
              if (response.ok) { setDataSpj(prev => prev.filter(spj => spj.id !== id)); alert('Berhasil dihapus!'); }
              else { alert('Gagal! Server bilang: ' + text); }
            } catch (error) { console.error('Error:', error); }
          };

          const handleOpenEdit = (spj) => { setEditingSpj(spj); setIsEditModalOpen(true); };

          const handleSaveEdit = async (e) => {
            e.preventDefault();
            setIsLoading(true);
            if (!editingSpj || !editingSpj.id) { alert("Error: ID tidak ditemukan!"); setIsLoading(false); return; }
            const formData = new FormData(e.target);
            const updatedDataPayload = {
              kecamatan: formData.get('kecamatan'), sekolah: formData.get('sekolah'),
              triwulan: formData.get('triwulan'), nominal: Number(formData.get('nominal')),
              rincian: formData.get('rincian'), pic: KECAMATAN_PIC[formData.get('kecamatan')]
            };
            try {
              const response = await fetch(`https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630/id/${editingSpj.id}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updatedDataPayload),
              });
              if (response.ok) {
                alert('Berhasil terkirim ke Sheets!');
                setDataSpj(prev => prev.map(spj => spj.id === editingSpj.id ? { ...spj, ...updatedDataPayload } : spj));
                setIsEditModalOpen(false); setEditingSpj(null);
              } else { alert('Gagal mengirim ke Sheets.'); }
            } catch (error) { console.error('Error:', error); alert('Terjadi kesalahan koneksi.'); }
            finally { setIsLoading(false); }
          };

          const handleDragStart = (e, id) => { setDraggedId(id); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); };
          const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
          const handleDrop = (e, targetId) => {
            e.preventDefault();
            if (!draggedId || draggedId === targetId) return setDraggedId(null);
            const draggedIdx = dataSpj.findIndex(item => item.id === draggedId);
            const targetIdx = dataSpj.findIndex(item => item.id === targetId);
            if (draggedIdx !== -1 && targetIdx !== -1) {
              const newData = [...dataSpj]; const [removed] = newData.splice(draggedIdx, 1); newData.splice(targetIdx, 0, removed); setDataSpj(newData);
            }
            setDraggedId(null);
          };
          const handleDragEnd = () => setDraggedId(null);

          const downloadExcel = (dataToDownload) => {
            if (dataToDownload.length === 0) { alert("Tidak ada data untuk diunduh."); return; }
            const tableHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>.num{mso-number-format:"#\\,\\#\\#0";text-align:right;}.text-center{text-align:center;}</style></head><body><table border="1" style="border-collapse:collapse;font-family:Arial,sans-serif;"><thead><tr style="background-color:#16a34a;color:white;font-weight:bold;"><th style="padding:8px;">NO</th><th style="padding:8px;">KECAMATAN</th><th style="padding:8px;">SEKOLAH</th><th style="padding:8px;">TRIWULAN</th><th style="padding:8px;">RINCIAN BELANJA</th><th style="padding:8px;">NOMINAL (Rp)</th></tr></thead><tbody>${dataToDownload.map((row,i)=>`<tr><td class="text-center" style="padding:5px;">${i+1}</td><td style="padding:5px;">${row.kecamatan}</td><td style="padding:5px;">${row.sekolah}</td><td class="text-center" style="padding:5px;">${row.triwulan}</td><td style="padding:5px;">${row.rincian}</td><td class="num" style="padding:5px;">${row.nominal}</td></tr>`).join('')}</tbody></table></body></html>`;
            const blob = new Blob([tableHTML], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url); link.setAttribute("download", `Rekap_SPJ_Siap_Cair_${new Date().toISOString().split('T')[0]}.xls`);

                      Sedang Menyimpan...

                </button>
              </form>
            </div>

                            <button onClick={() => handleOpenEdit(spj)} className="bg-amber-50 text-amber-600 hover:bg-amber-100 px-2 py-1.5 rounded text-xs font-bold inline-flex items-center transition"><IconEdit size={14} className="mr-1 hidden sm:block"/> Edit</button>

                          </div>

                    </tr>

                </tbody>

          );

                  <button onClick={() => setActiveTab('siapCair')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'siapCair' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconBanknote/> <span>Antrian Siap Cair</span></button>

                          <select required name="triwulan" value={editingSpj.triwulan}
                            onChange={(e) => setEditingSpj({...editingSpj, triwulan: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                            <option value="Triwulan 1">Triwulan 1 (Jan-Mar)</option>
                            <option value="Triwulan 2">Triwulan 2 (Apr-Jun)</option>
                            <option value="Triwulan 3">Triwulan 3 (Jul-Sep)</option>
                            <option value="Triwulan 4">Triwulan 4 (Okt-Des)</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Nominal (Rp)</label>
                          <input required name="nominal" type="number" value={editingSpj.nominal}
                            onChange={(e) => setEditingSpj({...editingSpj, nominal: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500"/>
                        </div>
                      </div>
                      <div className="relative z-20">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Rincian Belanja Singkat</label>
                        <CustomComboBox name="rincian" value={editingSpj.rincian}
                          onChange={(e) => setEditingSpj({...editingSpj, rincian: e.target.value})}
                          options={RINCIAN_OPTIONS}
                          className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" required/>
                      </div>
                      <div className="flex justify-end space-x-2 pt-4 border-t">
                        <button type="button" onClick={() => setIsEditModalOpen(false)} disabled={isLoading}
                          className="px-4 py-2 border rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50">Batal</button>
                        <button type="submit" disabled={isLoading}
                          className={`px-4 py-2 text-white rounded font-bold transition flex items-center ${isLoading ? 'bg-amber-300 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600'}`}>
                          {isLoading ? (
                            <><svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>Menyimpan...</>
                          ) : "Simpan Perubahan"}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App/>);
    </script>
</body>
</html>
