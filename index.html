        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

          if (n >= 1000000000) return `${(n/1000000000).toFixed(1)}M`;

        // ============================================================
        // KOMPONEN PAGU INFO CARD (asli, tidak diubah)

        const PaguInfoCard = ({ sekolah, rincian, triwulan, nominalInput, dataSpj }) => {

                            <span className="font-semibold text-gray-800 text-right">{formatRupiah(paguInfo.total)}</span>
                            <span className="text-gray-500">Pagu {triwulan}</span>
                            <span className={`font-semibold text-right ${twHasNoPagu ? 'text-amber-600 italic text-xs' : 'text-gray-800'}`}>
                                {twHasNoPagu ? 'Tidak dianggarkan di TW ini' : formatRupiah(paguInfo.triwulan)}
                            </span>
                            <span className="text-gray-500">SPJ Sudah Diajukan</span>
                            <span className={`font-semibold text-right ${sudahDiajukan > 0 ? 'text-orange-600' : 'text-gray-400'}`}>

                                className="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg text-xs font-bold transition inline-flex items-center gap-1 border border-emerald-200">
                                <IconEye size={12}/> Detail
                              </button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                    {filtered.length > 0 && (
                      <tfoot>
                        <tr className="bg-gray-100 font-bold border-t-2 border-gray-300">
                          <td colSpan="3" className="px-4 py-3 text-gray-700">TOTAL ({filtered.length} Sekolah)</td>
                          <td className="px-4 py-3 text-right text-gray-800">{formatRupiah(totalPagu)}</td>
                          <td className="px-4 py-3 text-right text-orange-700">{formatRupiah(totalTerpakai)}</td>
                          <td className={`px-4 py-3 text-right ${totalSisa >= 0 ? 'text-green-700' : 'text-red-700'}`}>{formatRupiah(totalSisa)}</td>
                          <td colSpan="2" className="px-4 py-3 text-center text-xs text-gray-500">
                            Serapan rata-rata: {totalPagu > 0 ? ((totalTerpakai/totalPagu)*100).toFixed(1) : 0}%
                          </td>
                        </tr>
                      </tfoot>
                    )}
                  </table>
                </div>
              </div>
            </div>
          );
        };
 
        // --- DATA AWAL ---
        const initialData = [];
 
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [dataSpj, setDataSpj] = useState(initialData);
          const [isLoading, setIsLoading] = useState(false);
          const [addForm, setAddForm] = useState({ kecamatan: '', sekolah: '', rincian: '', nominal: '', triwulan: 'Triwulan 1' });
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [selectedSpj, setSelectedSpj] = useState(null);
          const [verdict, setVerdict] = useState('Siap Cair');
          const [notes, setNotes] = useState('');
          const [isEditModalOpen, setIsEditModalOpen] = useState(false);
          const [editingSpj, setEditingSpj] = useState(null);
          const [draggedId, setDraggedId] = useState(null);
          const [aksesPic, setAksesPic] = useState('Semua');
 
          const stats = {
            total: dataSpj.length,
            menunggu: dataSpj.filter(d => d.status === 'Menunggu Verifikasi').length,
            siapCair: dataSpj.filter(d => d.status === 'Siap Cair').length,
            revisi: dataSpj.filter(d => d.status === 'Revisi').length,
            ditunda: dataSpj.filter(d => d.status === 'Ditunda').length,
          };
 
          const handleFormChange = (e) => {
            const { name, value } = e.target;
            let newForm = { ...addForm, [name]: value };
            if (name === 'kecamatan') newForm.sekolah = '';
            setAddForm(newForm);
          };
 
          const handleAddNewSpj = async (e) => {
            e.preventDefault();
            setIsLoading(true);
            const newSpj = {
              id: `SPJ-00${dataSpj.length + 1}`,
              kecamatan: addForm.kecamatan, sekolah: addForm.sekolah,
              pic: KECAMATAN_PIC[addForm.kecamatan],
              tanggal: new Date().toISOString().split('T')[0],
              triwulan: addForm.triwulan, rincian: addForm.rincian,
              nominal: Number(addForm.nominal), status: 'Menunggu Verifikasi', catatan: '-'
            };
            try {
              const response = await fetch('https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newSpj),
              });
              if (response.ok) {
                setDataSpj([newSpj, ...dataSpj]);
                setAddForm({ kecamatan: '', sekolah: '', rincian: '', nominal: '', triwulan: 'Triwulan 1' });
                alert('Data berhasil disimpan ke Google Sheets!');
                setActiveTab('verifikasi');
              } else { alert('Gagal menyimpan data.'); }
            } catch (error) { console.error('Error:', error); alert('Terjadi kesalahan saat menyambungkan ke Google Sheets.'); }
            finally { setIsLoading(false); }
          };
 
          const openVerifyModal = (spj) => { setSelectedSpj(spj); setVerdict('Siap Cair'); setNotes(''); setIsModalOpen(true); };
 
          const submitVerification = async () => {
            const today = new Date().toISOString().split('T')[0];
            const updatedData = dataSpj.map(spj => spj.id === selectedSpj.id ? { ...spj, status: verdict, catatan: verdict === 'Siap Cair' ? '' : notes, tanggal: today } : spj);
            setDataSpj(updatedData);
            setIsModalOpen(false);
            try {
              await fetch(`https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630/id/${selectedSpj.id}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: verdict, catatan: verdict === 'Siap Cair' ? '' : notes, tanggal: today }),
              });
              alert('Status di Sheets berhasil diperbarui!');
            } catch (error) { alert('Status di aplikasi berubah, tapi gagal sinkron ke Sheets.'); }
          };
 
          const handleDeleteSpj = async (id) => {
            if (!window.confirm('Yakin ingin hapus ID: ' + id + '?')) return;
            try {
              const response = await fetch(`https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630/id/${id}`, { method: 'DELETE' });
              const text = await response.text();
              if (response.ok) { setDataSpj(prev => prev.filter(spj => spj.id !== id)); alert('Berhasil dihapus!'); }
              else { alert('Gagal! Server bilang: ' + text); }
            } catch (error) { console.error('Error:', error); }
          };
 
          const handleOpenEdit = (spj) => { setEditingSpj(spj); setIsEditModalOpen(true); };
 
          const handleSaveEdit = async (e) => {
            e.preventDefault();
            setIsLoading(true);
            if (!editingSpj || !editingSpj.id) { alert("Error: ID tidak ditemukan!"); setIsLoading(false); return; }
            const formData = new FormData(e.target);
            const updatedDataPayload = {
              kecamatan: formData.get('kecamatan'), sekolah: formData.get('sekolah'),
              triwulan: formData.get('triwulan'), nominal: Number(formData.get('nominal')),
              rincian: formData.get('rincian'), pic: KECAMATAN_PIC[formData.get('kecamatan')]
            };
            try {
              const response = await fetch(`https://api.sheetbest.com/sheets/621834c3-c8ee-4836-8e10-23f6679f0630/id/${editingSpj.id}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updatedDataPayload),
              });
              if (response.ok) {
                alert('Berhasil terkirim ke Sheets!');
                setDataSpj(prev => prev.map(spj => spj.id === editingSpj.id ? { ...spj, ...updatedDataPayload } : spj));
                setIsEditModalOpen(false); setEditingSpj(null);
              } else { alert('Gagal mengirim ke Sheets.'); }
            } catch (error) { console.error('Error:', error); alert('Terjadi kesalahan koneksi.'); }
            finally { setIsLoading(false); }
          };
 
          const handleDragStart = (e, id) => { setDraggedId(id); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); };
          const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
          const handleDrop = (e, targetId) => {
            e.preventDefault();
            if (!draggedId || draggedId === targetId) return setDraggedId(null);
            const draggedIdx = dataSpj.findIndex(item => item.id === draggedId);
            const targetIdx = dataSpj.findIndex(item => item.id === targetId);
            if (draggedIdx !== -1 && targetIdx !== -1) {
              const newData = [...dataSpj]; const [removed] = newData.splice(draggedIdx, 1); newData.splice(targetIdx, 0, removed); setDataSpj(newData);
            }
            setDraggedId(null);
          };
          const handleDragEnd = () => setDraggedId(null);
 
          const downloadExcel = (dataToDownload) => {
            if (dataToDownload.length === 0) { alert("Tidak ada data untuk diunduh."); return; }
            const tableHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>.num{mso-number-format:"#\\,\\#\\#0";text-align:right;}.text-center{text-align:center;}</style></head><body><table border="1" style="border-collapse:collapse;font-family:Arial,sans-serif;"><thead><tr style="background-color:#16a34a;color:white;font-weight:bold;"><th style="padding:8px;">NO</th><th style="padding:8px;">KECAMATAN</th><th style="padding:8px;">SEKOLAH</th><th style="padding:8px;">TRIWULAN</th><th style="padding:8px;">RINCIAN BELANJA</th><th style="padding:8px;">NOMINAL (Rp)</th></tr></thead><tbody>${dataToDownload.map((row,i)=>`<tr><td class="text-center" style="padding:5px;">${i+1}</td><td style="padding:5px;">${row.kecamatan}</td><td style="padding:5px;">${row.sekolah}</td><td class="text-center" style="padding:5px;">${row.triwulan}</td><td style="padding:5px;">${row.rincian}</td><td class="num" style="padding:5px;">${row.nominal}</td></tr>`).join('')}</tbody></table></body></html>`;
            const blob = new Blob([tableHTML], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url); link.setAttribute("download", `Rekap_SPJ_Siap_Cair_${new Date().toISOString().split('T')[0]}.xls`);
            link.style.visibility = 'hidden'; document.body.appendChild(link); link.click(); document.body.removeChild(link);
          };

          const renderDashboard = () => (

                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer hover:bg-gray-50" onClick={() => setActiveTab('verifikasi')}>

                  <div className="p-3 bg-green-100 text-green-600 rounded-lg"><IconCheckCircle2 size={24}/></div>
                  <div><p className="text-sm text-gray-500">Antrian Siap Cair</p><p className="text-2xl font-bold">{stats.siapCair}</p></div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer hover:bg-gray-50" onClick={() => setActiveTab('kendala')}>
                  <div className="p-3 bg-red-100 text-red-600 rounded-lg"><IconAlertCircle size={24}/></div>
                  <div><p className="text-sm text-gray-500">Revisi / Ditunda</p><p className="text-2xl font-bold">{stats.revisi + stats.ditunda}</p></div>
                </div>
              </div>
            </div>
          );
 
          // --- RENDER PENERIMAAN ---
          const renderPenerimaan = () => (

                  className="text-xs font-bold bg-purple-100 text-purple-700 px-3 py-2 rounded-lg hover:bg-purple-200 transition flex items-center shrink-0">
                  <IconDownload size={14} className="mr-1"/> Database
                </a>
              </div>
              <form onSubmit={handleAddNewSpj} className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <div className="flex justify-between items-center mb-1">
                      <label className="block text-sm font-medium text-gray-700">Kecamatan</label>
                      {addForm.kecamatan && <span className="text-xs font-bold bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full">PIC: {KECAMATAN_PIC[addForm.kecamatan]}</span>}
                    </div>
                    <select required name="kecamatan" value={addForm.kecamatan} onChange={handleFormChange} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                      <option value="">-- Pilih Kecamatan --</option>
                      {KECAMATAN_LIST.map(kec => <option key={kec} value={kec}>{kec}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Nama Sekolah</label>

                      <option value="">-- Pilih Sekolah --</option>
                      {addForm.kecamatan && SEKOLAH_DATA[addForm.kecamatan]?.map(sek => <option key={sek} value={sek}>{sek}</option>)}
                    </select>
                  </div>
                </div>
 
                <div className="relative z-20">
                  <label className="block text-sm font-medium text-gray-700 mb-1">Rincian Belanja Singkat</label>

                />
 
                <button type="submit" disabled={isLoading}
                  className={`w-full font-bold py-3 rounded-lg mt-4 shadow-md transition flex items-center justify-center ${isLoading ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                  {isLoading ? (
                    <>
                      <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                      </svg>
                      Sedang Menyimpan...
                    </>
                  ) : "Simpan & Antrekan Verifikasi"}
                </button>
              </form>
            </div>
          );
 
          // --- TABLE TEMPLATE ---
          const TableTemplate = ({ data, showVerifyAction, isDraggable, onDragStart, onDragOver, onDrop, onDragEnd, draggedId, requiresPicLock, currentPic }) => (
            <div className="overflow-x-auto">

                <tbody className="text-sm">
                  {data.length === 0 ? <tr><td colSpan={isDraggable ? 6 : 5} className="p-8 text-center text-gray-500">Tidak ada data.</td></tr> : data.map((spj) => (
                    <tr key={spj.id}
                      className={`border-b border-gray-100 hover:bg-gray-50 transition-colors ${isDraggable ? 'cursor-move' : ''} ${draggedId === spj.id ? 'opacity-50 bg-blue-50' : ''}`}
                      draggable={isDraggable} onDragStart={isDraggable ? (e) => onDragStart(e, spj.id) : null}
                      onDragOver={isDraggable ? onDragOver : null} onDrop={isDraggable ? (e) => onDrop(e, spj.id) : null} onDragEnd={isDraggable ? onDragEnd : null}>
                      {isDraggable && <td className="p-4 text-gray-400"><IconGripVertical size={18}/></td>}

                      <td className="p-4 font-medium text-gray-800">{spj.sekolah}<br/><span className="text-xs text-gray-500 font-normal flex items-center mt-1"><IconMapPin size={12} className="mr-1"/> Kec. {spj.kecamatan} (PIC: {spj.pic}) • {spj.triwulan}</span></td>
                      <td className="p-4 max-w-xs"><div className="font-bold text-blue-700">{formatRupiah(spj.nominal)}</div><div className="text-xs text-gray-500 truncate mt-1" title={spj.rincian}>{spj.rincian}</div></td>
                      <td className="p-4">

                        {spj.catatan && <div className="text-xs text-red-500 mt-1 max-w-[150px]">{spj.catatan}</div>}
                      </td>
                      <td className="p-4 text-right">
                        {requiresPicLock && currentPic !== spj.pic ? (
                          <span className="text-xs font-semibold text-gray-500 italic bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-200 inline-block text-center w-full">Aksi Terkunci</span>

                            <button onClick={() => handleOpenEdit(spj)} className="bg-amber-50 text-amber-600 hover:bg-amber-100 px-2 py-1.5 rounded text-xs font-bold inline-flex items-center transition"><IconEdit size={14} className="mr-1 hidden sm:block"/> Edit</button>
                            <button onClick={() => handleDeleteSpj(spj.id)} className="bg-red-50 text-red-600 hover:bg-red-100 px-2 py-1.5 rounded text-xs font-bold inline-flex items-center transition"><IconTrash size={14} className="mr-1 hidden sm:block"/> Hapus</button>

                  <button onClick={() => setActiveTab('kendala')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'kendala' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconAlertCircle/> <span>Revisi & Tunda</span></button>

                    <div className="border-t border-gray-200 pt-2">
                      <button onClick={() => setActiveTab('rak')}
                        className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'rak' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <IconTable size={20} className={activeTab === 'rak' ? 'text-emerald-600' : ''}/>
                        <span className="flex-1 text-left font-semibold">RAK BOS 2026</span>
                        <span className={`text-xs px-1.5 py-0.5 rounded-full font-bold ${activeTab === 'rak' ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500'}`}>
                          {Object.keys(RAK_DATA).length}
                        </span>
                      </button>
                    </div>
                  </div>
                </nav>
              </aside>
 
              <main className="flex-1 flex flex-col h-screen overflow-hidden">
                <header className="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                  <div className="font-bold text-gray-700">
                    {activeTab === 'rak' ? (
                      <span className="flex items-center gap-2 text-emerald-700">
                        <IconTable size={18}/> RAK BOS 2026
                      </span>
                    ) : 'Panel Verifikator'}
                  </div>
                </header>
                <div className="flex-1 overflow-auto p-4 md:p-8 relative z-0">
                  {activeTab === 'dashboard' && renderDashboard()}
                  {activeTab === 'penerimaan' && renderPenerimaan()}
                  {activeTab === 'rak' && <RakBosPageWrapper dataSpj={dataSpj}/>}
                  {(activeTab === 'verifikasi' || activeTab === 'siapCair' || activeTab === 'kendala') && (() => {
                    let dataSpjFiltered = dataSpj.filter(spj => activeTab === 'verifikasi' ? spj.status === 'Menunggu Verifikasi' : activeTab === 'siapCair' ? spj.status === 'Siap Cair' : spj.status === 'Revisi' || spj.status === 'Ditunda');
                    if (activeTab === 'verifikasi' && aksesPic !== 'Semua') dataSpjFiltered = dataSpjFiltered.filter(spj => spj.pic === aksesPic);
                    return (
                      <div>
                        <div className="flex justify-between items-center mb-4">
                          <h2 className="text-xl font-bold">{activeTab === 'verifikasi' ? 'Antrian Verifikasi SPJ' : activeTab === 'siapCair' ? 'Daftar SPJ Siap Cair' : 'Daftar SPJ Revisi & Ditunda'}</h2>
                          {activeTab === 'siapCair' && (
                            <button onClick={() => downloadExcel(dataSpjFiltered)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center shadow-md transition">
                              <IconDownload size={16} className="mr-2"/> Unduh Rekap (Excel)
                            </button>
                          )}
                        </div>
                        {activeTab === 'verifikasi' && (
                          <div className="mb-6 bg-blue-50 border border-blue-200 p-4 rounded-xl flex flex-col md:flex-row items-start md:items-center justify-between gap-4 shadow-sm">
                            <div>
                              <h3 className="font-bold text-blue-800 flex items-center"><IconClipboardCheck size={18} className="mr-2"/>Mode Akses Verifikator</h3>
                              <p className="text-sm text-blue-600 mt-1">Pilih nama PIC Anda untuk memfilter SPJ dan membuka akses Koreksi/Edit/Hapus.</p>
                            </div>
                            <select value={aksesPic} onChange={(e) => setAksesPic(e.target.value)}
                              className="w-full md:w-auto p-2.5 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm font-bold bg-white text-gray-700 cursor-pointer shadow-sm">
                              <option value="Semua">-- Semua PIC (Hanya Mode Lihat) --</option>
                              {PIC_LIST.map(pic => <option key={pic} value={pic}>Login sbg PIC: {pic}</option>)}
                            </select>
                          </div>
                        )}
                        <TableTemplate data={dataSpjFiltered} showVerifyAction={activeTab === 'verifikasi' || activeTab === 'kendala'}
                          isDraggable={activeTab === 'siapCair'} onDragStart={handleDragStart} onDragOver={handleDragOver}
                          onDrop={handleDrop} onDragEnd={handleDragEnd} draggedId={draggedId}
                          requiresPicLock={activeTab === 'verifikasi'} currentPic={aksesPic}/>
                      </div>
                    );
                  })()}
                </div>
              </main>
 
              {/* MODAL VERIFIKASI */}
              {isModalOpen && selectedSpj && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-2xl max-w-3xl w-full p-6 space-y-4 shadow-xl flex flex-col max-h-[90vh]">
                    <div className="flex justify-between items-center"><h3 className="text-xl font-bold">Verifikasi Berkas</h3><button onClick={() => setIsModalOpen(false)}><IconXCircle/></button></div>
                    <div className="overflow-y-auto flex-1 space-y-4">
                      <div className="bg-gray-50 p-4 rounded-lg text-sm grid grid-cols-2 gap-4 border border-gray-200">
                        <div><p><b>Instansi:</b> {selectedSpj.sekolah} (Kec. {selectedSpj.kecamatan})</p><p><b>PIC:</b> <span className="font-bold text-indigo-700">{selectedSpj.pic}</span></p><p><b>Tgl Update:</b> {selectedSpj.tanggal}</p></div>
                        <div><p><b>Triwulan:</b> {selectedSpj.triwulan}</p><p><b>Nominal:</b> <span className="text-blue-600 font-bold text-lg">{formatRupiah(selectedSpj.nominal)}</span></p><p className="mt-1"><b>Rincian:</b> <span className="bg-white px-2 py-1 rounded border shadow-sm block mt-1">{selectedSpj.rincian}</span></p></div>
                      </div>
                      <div>
                        <label className="block text-sm font-bold mb-2">Keputusan Verifikator:</label>
                        <div className="flex space-x-2">
                          <button onClick={() => setVerdict('Siap Cair')} className={`flex-1 py-3 border rounded text-sm transition ${verdict === 'Siap Cair' ? 'bg-green-100 border-green-500 text-green-700 font-bold shadow-inner' : 'hover:bg-gray-50'}`}>Diterima (Siap Cair)</button>
                          <button onClick={() => setVerdict('Revisi')} className={`flex-1 py-3 border rounded text-sm transition ${verdict === 'Revisi' ? 'bg-red-100 border-red-500 text-red-700 font-bold shadow-inner' : 'hover:bg-gray-50'}`}>Kembalikan (Revisi)</button>
                          <button onClick={() => setVerdict('Ditunda')} className={`flex-1 py-3 border rounded text-sm transition ${verdict === 'Ditunda' ? 'bg-orange-100 border-orange-500 text-orange-700 font-bold shadow-inner' : 'hover:bg-gray-50'}`}>Tunda Proses</button>
                        </div>
                      </div>
                      {(verdict === 'Revisi' || verdict === 'Ditunda') && (
                        <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows="2" className="w-full p-2 border rounded-lg text-sm" placeholder="Tulis alasan revisi/tunda..."></textarea>
                        </div>
                      )}
                    </div>
                    <div className="flex justify-end space-x-2 pt-4 border-t"><button onClick={() => setIsModalOpen(false)} className="px-4 py-2 border rounded text-gray-600 font-medium">Batal</button><button onClick={submitVerification} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold shadow-md">Simpan Perubahan</button></div>
                  </div>
                </div>
              )}
 
              {/* MODAL EDIT */}
              {isEditModalOpen && editingSpj && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-2xl max-w-2xl w-full p-6 shadow-xl max-h-[90vh] overflow-y-auto">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-xl font-bold flex items-center"><IconEdit className="mr-2 text-amber-500" size={24}/> Edit Data SPJ</h3>
                      <button onClick={() => setIsEditModalOpen(false)}><IconXCircle/></button>
                    </div>
                    <form onSubmit={handleSaveEdit} className="space-y-4">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Kecamatan</label>
                          <select required name="kecamatan" value={editingSpj.kecamatan}
                            onChange={(e) => setEditingSpj({...editingSpj, kecamatan: e.target.value, sekolah: ''})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                            <option value="">-- Pilih Kecamatan --</option>
                            {KECAMATAN_LIST.map(kec => <option key={kec} value={kec}>{kec}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Nama Sekolah</label>
                          <select required name="sekolah" value={editingSpj.sekolah}
                            onChange={(e) => setEditingSpj({...editingSpj, sekolah: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                            <option value="">-- Pilih Sekolah --</option>
                            {SEKOLAH_DATA[editingSpj.kecamatan]?.map(sek => <option key={sek} value={sek}>{sek}</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Triwulan Pelaksanaan</label>
                          <select required name="triwulan" value={editingSpj.triwulan}
                            onChange={(e) => setEditingSpj({...editingSpj, triwulan: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                            <option value="Triwulan 1">Triwulan 1 (Jan-Mar)</option>
                            <option value="Triwulan 2">Triwulan 2 (Apr-Jun)</option>
                            <option value="Triwulan 3">Triwulan 3 (Jul-Sep)</option>
                            <option value="Triwulan 4">Triwulan 4 (Okt-Des)</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Nominal (Rp)</label>
                          <input required name="nominal" type="number" value={editingSpj.nominal}
                            onChange={(e) => setEditingSpj({...editingSpj, nominal: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500"/>
                        </div>
                      </div>
                      <div className="relative z-20">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Rincian Belanja Singkat</label>
                        <CustomComboBox name="rincian" value={editingSpj.rincian}
                          onChange={(e) => setEditingSpj({...editingSpj, rincian: e.target.value})}
                          options={RINCIAN_OPTIONS}
                          className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" required/>
                      </div>
                      <div className="flex justify-end space-x-2 pt-4 border-t">
                        <button type="button" onClick={() => setIsEditModalOpen(false)} disabled={isLoading}
                          className="px-4 py-2 border rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50">Batal</button>
                        <button type="submit" disabled={isLoading}
                          className={`px-4 py-2 text-white rounded font-bold transition flex items-center ${isLoading ? 'bg-amber-300 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600'}`}>
                          {isLoading ? (
                            <><svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>Menyimpan...</>
                          ) : "Simpan Perubahan"}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }
 
        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App/>);
    </script>
</body>
</html>
