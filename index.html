  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function simpanData() {
    const nama = document.getElementById("inputNamaSekolah").value;
    const nominal = document.getElementById("inputAnggaran").value;
    db.collection("data_spj").add({
      sekolah: nama,
      anggaran: parseInt(nominal),
      tanggal: new Date().toISOString()
    }).then(() => {
      alert("Data berhasil tersimpan!");
      tampilkanDataKeTabel();
    });
  }

  function tampilkanDataKeTabel() {
    const tbody = document.getElementById("tabelBody");
    db.collection("data_spj").get().then((querySnapshot) => {
      tbody.innerHTML = "";
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        tbody.innerHTML += `<tr><td class="border p-2">${data.sekolah}</td><td class="border p-2">${data.anggaran}</td></tr>`;
      });
    });
  }

  window.addEventListener('load', tampilkanDataKeTabel);
</script>

    function getSchoolNumber(name) {
        if (!name) return null;
        const m = name.match(/\b(\d+)\b/);
        return m ? m[1] : null;
    }

    function getPaguInfo(sekolah, rincian, triwulan) {
        const num = getSchoolNumber(sekolah);
        if (!num || !RAK_DATA[num]) return null;
        const kode = rincian.split(' ')[0];
        if (!RAK_DATA[num][kode]) return null;
        const twArr = Array.isArray(triwulan) ? triwulan : [triwulan];
        // Hitung total pagu untuk semua TW yang dipilih
        const totalTwPagu = twArr.reduce((acc, twStr) => {
            const twNum = twStr ? twStr.replace('Triwulan ', '') : '1';
            return acc + (RAK_DATA[num][kode][twNum] || 0);
        }, 0);
        return {
            total: RAK_DATA[num][kode]['t'] || 0,
            triwulan: totalTwPagu,
            kode: kode
        };
    }

    window.rakDataGlobal = [];

    function getPaguInfoEnhanced(sekolah, rincian, triwulan) {
        const fromOriginal = getPaguInfo(sekolah, rincian, triwulan);
        if (fromOriginal) return fromOriginal;
        if (!window.rakDataGlobal || window.rakDataGlobal.length === 0) return null;
        const num = getSchoolNumber(sekolah);
        if (!num) return null;
        const schoolData = window.rakDataGlobal.find(s => String(s.no) === String(num));
        if (!schoolData) return null;
        const kode = rincian.split(' ')[0];
        const rincianItem = schoolData.rincian.find(r => {
            const rKode = r.kode || '';
            const rSuffix = rKode.replace('5.1.02.01.01.', '').replace(/^0+/, '');
            const kSuffix = kode.replace('5.1.02.01.01.', '').replace(/^0+/, '');
            return rKode === kode || rSuffix === kSuffix;
        });
        if (!rincianItem) return null;
        const twArr = Array.isArray(triwulan) ? triwulan : [triwulan];
        const totalTwPagu = twArr.reduce((acc, twStr) => {
            const twNum = twStr ? twStr.replace('Triwulan ', '') : '1';
            const twKey = `tw${twNum}`;
            return acc + (rincianItem[twKey] || 0);
        }, 0);
        return {
            total: rincianItem.paguTotal || 0,
            triwulan: totalTwPagu,
            kode: kode
        };
    }

                                  <td className="p-2 text-right bg-purple-200 text-purple-900">{formatRupiah(rakDetailSekolah.rincian.reduce((a,r)=>a+r.des,0))}</td>
                                </tr>
                              </tfoot>
                            </table>
                          </div>
                        )}
                        {(() => {
                          const spjSekolah = dataSpj.filter(s => s.sekolah === rakDetailSekolah.namaUpt);
                          if (spjSekolah.length === 0) return null;
                          return (
                            <div className="mt-4">
                              <h4 className="font-bold text-gray-700 mb-2 text-sm flex items-center gap-1"><IconClipboardCheck size={15}/> SPJ Sudah Diajukan</h4>
                              <div className="rounded-xl border border-gray-200 overflow-hidden">
                                <table className="w-full text-xs border-collapse">
                                  <thead><tr className="bg-gray-100 text-gray-600"><th className="p-2.5 text-left">ID SPJ</th><th className="p-2.5 text-left">Triwulan</th><th className="p-2.5 text-left">Rincian</th><th className="p-2.5 text-right">Nominal</th><th className="p-2.5 text-center">Status</th></tr></thead>
                                  <tbody>
                                    {spjSekolah.map((s, i) => (
                                      <tr key={i} className="border-t border-gray-100 hover:bg-gray-50">
                                        <td className="p-2.5 text-gray-600 font-mono">{s.id}</td>
                                        <td className="p-2.5 text-gray-700">{s.triwulan}</td>
                                        <td className="p-2.5 text-gray-700 max-w-[200px] truncate" title={s.rincian}>{s.rincian}</td>
                                        <td className="p-2.5 text-right font-bold text-blue-700">{formatRupiah(s.nominal)}</td>
                                        <td className="p-2.5 text-center"><span className={`px-2 py-0.5 rounded-full text-xs font-medium ${s.status === 'Sudah Cair' ? 'bg-teal-100 text-teal-800' : s.status === 'Siap Cair' ? 'bg-green-100 text-green-800' : s.status === 'Revisi' ? 'bg-red-100 text-red-800' : s.status === 'Ditunda' ? 'bg-orange-100 text-orange-800' : s.status === 'Menunggu Verifikasi' ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800'}`}>{s.status}</span></td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                      <div className="p-4 border-t flex justify-end">
                        <button onClick={() => setRakDetailOpen(false)} className="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm transition">Tutup</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          // ============================================================
          // FUNGSI RENDER TABEL SPJ (dipakai oleh semua tab daftar SPJ)
          // PERUBAHAN POIN 1: filter tidak direset, hanya diaplikasikan
          // PERUBAHAN POIN 2: activeTab 'revisi' dan 'ditunda' dipisah
          // ============================================================
          const renderSpjTable = (statusFilter) => {
            let dataSpjFiltered = dataSpj.filter(spj => {
              if (statusFilter === 'verifikasi') return spj.status === 'Menunggu Verifikasi';
              if (statusFilter === 'siapCair') return spj.status === 'Siap Cair';
              if (statusFilter === 'revisi') return spj.status === 'Revisi';
              if (statusFilter === 'ditunda') return spj.status === 'Ditunda';
              return false;
            });

            // Filter PIC di tab verifikasi (mode akses PIC)
            if (statusFilter === 'verifikasi' && aksesPic !== 'Semua') {
              dataSpjFiltered = dataSpjFiltered.filter(spj => spj.pic === aksesPic);
            }

            // Filter kecamatan (semua tab)
            if (filterKecamatan !== 'Semua') {
              dataSpjFiltered = dataSpjFiltered.filter(spj => spj.kecamatan === filterKecamatan);
            }

            // Filter PIC (bukan verifikasi)
            if (statusFilter !== 'verifikasi' && filterPic !== 'Semua') {
              dataSpjFiltered = dataSpjFiltered.filter(spj => spj.pic === filterPic);
            }

            // Filter triwulan
            if (filterTriwulan !== 'Semua') {
              dataSpjFiltered = dataSpjFiltered.filter(spj => spj.triwulan === filterTriwulan);
            }

            // Urutkan
            dataSpjFiltered = [...dataSpjFiltered].sort((a, b) => {
              const numA = parseInt(a.id?.replace(/\D/g, '') || 0);
              const numB = parseInt(b.id?.replace(/\D/g, '') || 0);
              return sortOrder === 'asc' ? numA - numB : numB - numA;
            });

            // Search
            if (searchQuery.trim() !== '') {
              const q = searchQuery.toLowerCase();
              dataSpjFiltered = dataSpjFiltered.filter(spj =>
                (spj.sekolah && spj.sekolah.toLowerCase().includes(q)) ||
                (spj.id && spj.id.toLowerCase().includes(q)) ||
                (spj.kecamatan && spj.kecamatan.toLowerCase().includes(q)) ||
                (spj.rincian && spj.rincian.toLowerCase().includes(q)) ||
                (spj.nominal && String(spj.nominal).includes(q))
              );
            }

            const totalNominal = dataSpjFiltered.reduce((acc, s) => acc + (Number(s.nominal) || 0), 0);

            const judulTab = {
              verifikasi: 'Antrian Verifikasi SPJ',
              siapCair: 'Daftar SPJ Siap Cair',
              revisi: 'Daftar SPJ Perlu Revisi',
              ditunda: 'Daftar SPJ Ditunda',
            }[statusFilter];

            const warnaBadge = {
              verifikasi: 'bg-yellow-100 text-yellow-800',
              siapCair: 'bg-green-100 text-green-800',
              revisi: 'bg-red-100 text-red-800',
              ditunda: 'bg-orange-100 text-orange-800',

                  <div>
                    <h2 className="text-xl font-bold flex items-center gap-2">
                      {judulTab}
                      <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${warnaBadge}`}>{dataSpjFiltered.length}</span>
                    </h2>
                    <p className="text-sm text-gray-500 mt-0.5">
                      Total: <span className="font-semibold text-blue-600">{formatRupiah(totalNominal)}</span>
                    </p>
                  </div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <div className="relative w-full md:w-64">
                      <IconSearch size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
                      <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                        className="w-full pl-9 pr-8 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none bg-white shadow-sm"
                        placeholder="Cari sekolah, ID, rincian..."/>
                      {searchQuery && <button onClick={() => setSearchQuery('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>}
                    </div>
                    {statusFilter === 'siapCair' && (
                      <button onClick={() => downloadExcel(dataSpjFiltered)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center shadow-md transition">
                        <IconDownload size={16} className="mr-2"/> Unduh Rekap (Excel)
                      </button>
                    )}
                  </div>
                </div>

                {/* Filter bar — TETAP ada di semua tab, filter TIDAK reset saat ganti tab */}
                <div className="mb-4 bg-white border border-gray-200 rounded-xl p-3 shadow-sm flex flex-col md:flex-row gap-3 items-center flex-wrap">
                  <div className="flex items-center gap-1.5 text-xs font-semibold text-gray-500 shrink-0">
                    <IconFilter size={14}/> Filter:

                  <select value={filterKecamatan} onChange={e => setFilterKecamatan(e.target.value)}

                    <option value="Semua">Semua Kecamatan</option>
                    {KECAMATAN_LIST.map(k => <option key={k} value={k}>{k}</option>)}
                  </select>
                  <select value={filterPic} onChange={e => setFilterPic(e.target.value)}
                    className="w-full md:w-36 p-2 border border-gray-200 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-400">
                    <option value="Semua">Semua PIC</option>
                    {PIC_LIST.map(p => <option key={p} value={p}>PIC: {p}</option>)}
                  </select>
                  <select value={filterTriwulan} onChange={e => setFilterTriwulan(e.target.value)}
                    className="w-full md:w-40 p-2 border border-gray-200 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-400">
                    <option value="Semua">Semua Triwulan</option>
                    <option value="Triwulan 1">Triwulan 1</option>
                    <option value="Triwulan 2">Triwulan 2</option>
                    <option value="Triwulan 3">Triwulan 3</option>
                    <option value="Triwulan 4">Triwulan 4</option>
                  </select>
                  <button onClick={() => setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc')}
                    className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white shadow-sm hover:bg-gray-50 font-medium whitespace-nowrap">
                    {sortOrder === 'asc' ? '⬆ Terlama' : '⬇ Terbaru'}
                  </button>
                  {(filterKecamatan !== 'Semua' || filterPic !== 'Semua' || filterTriwulan !== 'Semua' || searchQuery) && (
                    <button onClick={() => { setFilterKecamatan('Semua'); setFilterPic('Semua'); setFilterTriwulan('Semua'); setSearchQuery(''); }}
                      className="px-3 py-2 bg-red-50 text-red-500 hover:bg-red-100 border border-red-200 rounded-lg text-xs font-bold transition whitespace-nowrap">
                      ✕ Reset Filter
                    </button>
                  )}
                </div>

                {/* Mode akses PIC hanya di tab verifikasi */}
                {statusFilter === 'verifikasi' && (
                  <div className="mb-4 bg-blue-50 border border-blue-200 p-4 rounded-xl flex flex-col md:flex-row items-start md:items-center justify-between gap-4 shadow-sm">
                    <div>
                      <h3 className="font-bold text-blue-800 flex items-center"><IconClipboardCheck size={18} className="mr-2"/>Mode Akses Verifikator</h3>
                      <p className="text-sm text-blue-600 mt-1">Pilih nama PIC Anda untuk memfilter SPJ dan membuka akses Koreksi/Edit/Hapus.</p>
                    </div>
                    <select value={aksesPic} onChange={(e) => setAksesPic(e.target.value)}
                      className="w-full md:w-auto p-2.5 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm font-bold bg-white text-gray-700 cursor-pointer shadow-sm">
                      <option value="Semua">-- Semua PIC (Hanya Mode Lihat) --</option>
                      {PIC_LIST.map(pic => <option key={pic} value={pic}>Login sbg PIC: {pic}</option>)}
                    </select>
                  </div>
                )}

                {/* BARU: Bar aksi pencairan, khusus tab Siap Cair */}

                      <IconWallet size={18} className="text-teal-600"/>
                      <p className="text-sm text-teal-800">
                        <span className="font-bold">{jumlahTerpilih}</span> SPJ terpilih untuk dicairkan.

                      </p>
                    </div>
                    <button onClick={openCairModal} disabled={jumlahTerpilih === 0}
                      className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center shadow-md transition ${jumlahTerpilih === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-teal-600 hover:bg-teal-700 text-white'}`}>
                      <IconWallet size={16} className="mr-2"/> Cairkan ke GU ({jumlahTerpilih})
                    </button>
                  </div>
                )}

                <TableTemplate
                  data={dataSpjFiltered}
                  showVerifyAction={true}
                  requiresPicLock={statusFilter === 'verifikasi'}
                  currentPic={aksesPic}
                  selectableForCair={isSiapCairTab}
                />
              </div>
            );
          };

          // ============================================================
          // BARU: Render tab "Sudah Cair" — list dikelompokkan per GU
          // ============================================================
          const renderSudahCair = () => {
            let dataCair = dataSpj.filter(spj => spj.status === 'Sudah Cair');

            if (sudahCairSearch.trim() !== '') {
              const q = sudahCairSearch.toLowerCase();
              dataCair = dataCair.filter(spj =>
                (spj.sekolah && spj.sekolah.toLowerCase().includes(q)) ||
                (spj.id && spj.id.toLowerCase().includes(q)) ||
                (spj.kecamatan && spj.kecamatan.toLowerCase().includes(q)) ||
                (spj.rincian && spj.rincian.toLowerCase().includes(q)) ||
                (spj.gu && String(spj.gu).toLowerCase().includes(q))
              );
            }

            // Kelompokkan per GU
            const grouped = {};
            dataCair.forEach(spj => {
              const guKey = spj.gu || 'Tanpa GU';
              if (!grouped[guKey]) grouped[guKey] = [];
              grouped[guKey].push(spj);
            });

            const guKeys = Object.keys(grouped).sort((a, b) => {
              const na = parseInt(String(a).replace(/\D/g, '')) || 0;
              const nb = parseInt(String(b).replace(/\D/g, '')) || 0;
              if (na !== nb) return nb - na; // GU terbaru di atas
              return String(b).localeCompare(String(a));
            });

            const totalKeseluruhan = dataCair.reduce((a, s) => a + (Number(s.nominal) || 0), 0);

            const toggleGu = (gu) => setExpandedGu(prev => ({ ...prev, [gu]: !prev[gu] }));

            return (
              <div>
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-3">
                  <div>
                    <h2 className="text-xl font-bold flex items-center gap-2 text-gray-800">
                      <IconWallet size={22} className="text-teal-600"/> SPJ Sudah Cair
                      <span className="text-xs font-bold px-2.5 py-1 rounded-full bg-teal-100 text-teal-800">{dataCair.length}</span>
                    </h2>
                    <p className="text-sm text-gray-500 mt-0.5">
                      Dikelompokkan per GU (Ganti Uang) • {guKeys.length} GU • Total: <span className="font-semibold text-teal-700">{formatRupiah(totalKeseluruhan)}</span>
                    </p>
                  </div>
                  <div className="relative w-full md:w-72">
                    <IconSearch size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
                    <input type="text" value={sudahCairSearch} onChange={e => setSudahCairSearch(e.target.value)}
                      className="w-full pl-9 pr-8 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-teal-400 focus:outline-none bg-white shadow-sm"
                      placeholder="Cari sekolah, ID, GU, rincian..."/>
                    {sudahCairSearch && <button onClick={() => setSudahCairSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>}
                  </div>
                </div>

                {guKeys.length === 0 ? (
                  <div className="bg-white rounded-xl border border-gray-100 p-12 text-center text-gray-400 shadow-sm">
                    <IconWallet size={36} className="mx-auto mb-2 text-gray-300"/>
                    Belum ada SPJ yang dicairkan. SPJ akan muncul di sini setelah dicairkan dari tab <strong>Antrian Siap Cair</strong>.
                  </div>
                ) : (
                  <div className="space-y-3">
                    {guKeys.map(gu => {
                      const listSpj = grouped[gu];
                      const totalGu = listSpj.reduce((a, s) => a + (Number(s.nominal) || 0), 0);
                      const isOpen = expandedGu[gu] !== false; // default terbuka
                      return (
                        <div key={gu} className="bg-white rounded-xl border border-teal-100 shadow-sm overflow-hidden">
                          <div onClick={() => toggleGu(gu)} className="flex items-center justify-between px-5 py-4 bg-teal-50 cursor-pointer hover:bg-teal-100 transition">
                            <div className="flex items-center gap-3">
                              <div className="p-2 bg-teal-600 text-white rounded-lg"><IconLayers size={18}/></div>
                              <div>
                                <p className="font-bold text-teal-800 flex items-center gap-2">
                                  {gu}
                                  <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-white text-teal-700 border border-teal-200">{listSpj.length} SPJ</span>
                                </p>
                                <p className="text-xs text-teal-600 mt-0.5">Total: <span className="font-semibold">{formatRupiah(totalGu)}</span></p>
                              </div>
                            </div>
                            <div className="flex items-center gap-2">
                              <button onClick={(e) => { e.stopPropagation(); downloadExcelGu(gu, listSpj); }}
                                className="bg-white text-teal-700 hover:bg-teal-50 border border-teal-200 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center shadow-sm transition">
                                <IconDownload size={13} className="mr-1"/> Excel
                              </button>
                              <IconChevronDown size={18} className={`text-teal-600 transition-transform ${isOpen ? 'rotate-180' : ''}`}/>
                            </div>
                          </div>
                          {isOpen && (
                            <div className="overflow-x-auto">
                              <table className="w-full text-left border-collapse text-sm">
                                <thead>
                                  <tr className="bg-gray-50 border-b border-gray-200 text-xs text-gray-500">
                                    <th className="p-3 font-semibold">ID</th>
                                    <th className="p-3 font-semibold">Instansi & Triwulan</th>
                                    <th className="p-3 font-semibold">Rincian</th>
                                    <th className="p-3 font-semibold text-right">Nominal</th>
                                    <th className="p-3 font-semibold text-center">Tgl Cair</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {listSpj.map(spj => (
                                    <tr key={spj.id} className="border-b border-gray-100 hover:bg-gray-50">
                                      <td className="p-3 font-medium text-gray-700">{spj.id}</td>
                                      <td className="p-3">
                                        <div className="font-medium text-gray-800">{spj.sekolah}</div>
                                        <div className="text-xs text-gray-500 flex items-center mt-0.5"><IconMapPin size={11} className="mr-1"/>Kec. {spj.kecamatan} • {spj.triwulan}</div>
                                      </td>
                                      <td className="p-3 text-xs text-gray-600 max-w-[220px] truncate" title={spj.rincian}>{spj.rincian}</td>
                                      <td className="p-3 text-right font-bold text-teal-700">{formatRupiah(spj.nominal)}</td>
                                      <td className="p-3 text-center text-xs text-gray-500">{spj.tanggalCair || spj.tanggal}</td>
                                    </tr>
                                  ))}
                                </tbody>
                                <tfoot>
                                  <tr className="bg-teal-50 font-bold text-sm">
                                    <td colSpan={3} className="p-3 text-teal-700">Total {gu}</td>
                                    <td className="p-3 text-right text-teal-700">{formatRupiah(totalGu)}</td>
                                    <td></td>
                                  </tr>
                                </tfoot>
                              </table>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-gray-100 flex font-sans">
              {/* SIDEBAR */}
              <aside className={`bg-white shadow-md flex-col hidden md:flex z-10 transition-all duration-300 overflow-hidden ${sidebarOpen ? 'w-64' : 'w-0'}`}>
                <div className="p-6 border-b">
                  <h1 className="text-xl font-extrabold text-blue-700">Sistem SPJ<span className="text-gray-800">BOS</span></h1>
                  <p className="text-xs text-gray-500">Dinas Pendidikan</p>
                  <div className={`mt-2 flex items-center gap-1.5 text-xs font-medium px-2 py-1 rounded-full w-fit ${isSyncing ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}`}>
                    <IconWifi size={11}/>
                    {isSyncing ? 'Menyambungkan...' : 'Tersinkron Realtime'}
                  </div>
                </div>
                <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                  <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'dashboard' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconDashboard/> <span>Dashboard</span></button>
                  <button onClick={() => setActiveTab('penerimaan')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'penerimaan' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconFileText/> <span>Terima SPJ Baru</span></button>
                  <button onClick={() => setActiveTab('verifikasi')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'verifikasi' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconClipboardCheck/> <span className="flex-1 text-left">Antrian Verifikasi</span> {stats.menunggu > 0 && <span className="bg-yellow-400 text-yellow-900 text-xs px-2 rounded-full">{stats.menunggu}</span>}</button>
                  <button onClick={() => setActiveTab('siapCair')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'siapCair' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><IconBanknote/> <span className="flex-1 text-left">Antrian Siap Cair</span> {stats.siapCair > 0 && <span className="bg-green-100 text-green-800 text-xs px-2 rounded-full font-bold">{stats.siapCair}</span>}</button>
                  {/* BARU: Menu Sudah Cair */}
                  <button onClick={() => setActiveTab('sudahCair')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'sudahCair' ? 'bg-teal-50 text-teal-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                    <IconWallet className={activeTab === 'sudahCair' ? 'text-teal-600' : ''}/>
                    <span className="flex-1 text-left">Sudah Cair</span>
                    {stats.sudahCair > 0 && <span className="bg-teal-100 text-teal-800 text-xs px-2 rounded-full font-bold">{stats.sudahCair}</span>}
                  </button>
                  {/* PERUBAHAN POIN 2: Revisi & Tunda dipisah jadi 2 menu */}
                  <button onClick={() => setActiveTab('revisi')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'revisi' ? 'bg-red-50 text-red-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                    <IconRotateCcw className={activeTab === 'revisi' ? 'text-red-600' : ''}/>
                    <span className="flex-1 text-left">Perlu Revisi</span>
                    {stats.revisi > 0 && <span className="bg-red-100 text-red-800 text-xs px-2 rounded-full font-bold">{stats.revisi}</span>}
                  </button>
                  <button onClick={() => setActiveTab('ditunda')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'ditunda' ? 'bg-orange-50 text-orange-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                    <IconPauseCircle className={activeTab === 'ditunda' ? 'text-orange-600' : ''}/>
                    <span className="flex-1 text-left">SPJ Ditunda</span>
                    {stats.ditunda > 0 && <span className="bg-orange-100 text-orange-800 text-xs px-2 rounded-full font-bold">{stats.ditunda}</span>}
                  </button>
                  <button onClick={() => setActiveTab('rakBosda')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium ${activeTab === 'rakBosda' ? 'bg-green-50 text-green-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                    <IconTable/> <span className="flex-1 text-left">RAK BOSDA 2026</span>
                    <span className="bg-green-100 text-green-800 text-xs px-2 rounded-full font-bold">389</span>
                  </button>
                </nav>
              </aside>

              <main className="flex-1 flex flex-col h-screen overflow-hidden">
                <header className="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 rounded-lg hover:bg-gray-100 transition text-gray-600">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <span className="font-bold text-gray-700">Panel Verifikator</span>
                  </div>
                  <div className={`flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full ${isSyncing ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}`}>
                    <span className={`w-2 h-2 rounded-full ${isSyncing ? 'bg-yellow-400 animate-pulse' : 'bg-green-400'}`}></span>
                    {isSyncing ? 'Menyambungkan ke server...' : `${dataSpj.length} data tersinkron`}
                  </div>
                </header>

                {isSyncing && (
                  <div className="absolute inset-0 bg-white bg-opacity-80 flex flex-col items-center justify-center z-50">
                    <svg className="animate-spin h-10 w-10 text-blue-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p className="text-blue-700 font-semibold text-lg">Menyambungkan ke database...</p>
                    <p className="text-gray-500 text-sm mt-1">Memuat data realtime dari Firestore</p>
                  </div>
                )}

                <div className="flex-1 overflow-auto p-4 md:p-8 relative z-0">
                  {activeTab === 'dashboard' && renderDashboard()}
                  {activeTab === 'penerimaan' && renderPenerimaan()}
                  {activeTab === 'rakBosda' && renderRakBosda()}
                  {activeTab === 'verifikasi' && renderSpjTable('verifikasi')}
                  {activeTab === 'siapCair' && renderSpjTable('siapCair')}
                  {activeTab === 'sudahCair' && renderSudahCair()}
                  {activeTab === 'revisi' && renderSpjTable('revisi')}
                  {activeTab === 'ditunda' && renderSpjTable('ditunda')}
                </div>
              </main>

              {/* MODAL VERIFIKASI */}
              {isModalOpen && selectedSpj && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-2xl max-w-3xl w-full p-6 space-y-4 shadow-xl flex flex-col max-h-[90vh]">
                    <div className="flex justify-between items-center"><h3 className="text-xl font-bold">Verifikasi Berkas</h3><button onClick={() => setIsModalOpen(false)}><IconXCircle/></button></div>
                    <div className="overflow-y-auto flex-1 space-y-4">
                      <div className="bg-gray-50 p-4 rounded-lg text-sm grid grid-cols-2 gap-4 border border-gray-200">
                        <div><p><b>Instansi:</b> {selectedSpj.sekolah} (Kec. {selectedSpj.kecamatan})</p><p><b>PIC:</b> <span className="font-bold text-indigo-700">{selectedSpj.pic}</span></p><p><b>Tgl Update:</b> {selectedSpj.tanggal}</p></div>
                        <div><p><b>Triwulan:</b> {selectedSpj.triwulan}</p><p><b>Nominal:</b> <span className="text-blue-600 font-bold text-lg">{formatRupiah(selectedSpj.nominal)}</span></p><p className="mt-1"><b>Rincian:</b> <span className="bg-white px-2 py-1 rounded border shadow-sm block mt-1">{selectedSpj.rincian}</span></p></div>
                      </div>
                      <div>
                        <label className="block text-sm font-bold mb-2">Keputusan Verifikator:</label>
                        <div className="flex space-x-2">
                          <button onClick={() => setVerdict('Siap Cair')} className={`flex-1 py-3 border rounded text-sm transition ${verdict === 'Siap Cair' ? 'bg-green-100 border-green-500 text-green-700 font-bold shadow-inner' : 'hover:bg-gray-50'}`}>Diterima (Siap Cair)</button>
                          <button onClick={() => setVerdict('Revisi')} className={`flex-1 py-3 border rounded text-sm transition ${verdict === 'Revisi' ? 'bg-red-100 border-red-500 text-red-700 font-bold shadow-inner' : 'hover:bg-gray-50'}`}>Kembalikan (Revisi)</button>
                          <button onClick={() => setVerdict('Ditunda')} className={`flex-1 py-3 border rounded text-sm transition ${verdict === 'Ditunda' ? 'bg-orange-100 border-orange-500 text-orange-700 font-bold shadow-inner' : 'hover:bg-gray-50'}`}>Tunda Proses</button>
                        </div>
                      </div>
                      {localRiwayat.length > 0 && (
                        <div className="bg-orange-50 border border-orange-200 rounded-lg p-3">
                          <div className="flex items-center justify-between mb-2">
                            <p className="text-xs font-bold text-orange-700">🕐 Riwayat Catatan Sebelumnya:</p>
                            <div className="flex gap-1.5">
                              {Object.values(checkedRiwayat).some(Boolean) && (
                                <>
                                  <button onClick={() => { const updated = localRiwayat.map((item, i) => checkedRiwayat[i] ? { ...item, selesai: !item.selesai } : item); setLocalRiwayat(updated); setCheckedRiwayat({}); }}
                                    className="text-xs bg-green-100 text-green-700 hover:bg-green-200 px-2 py-1 rounded font-bold transition flex items-center gap-1">✅ Tandai Selesai</button>
                                  <button onClick={() => { const newRiwayat = localRiwayat.filter((_, i) => !checkedRiwayat[i]); setLocalRiwayat(newRiwayat); setCheckedRiwayat({}); }}
                                    className="text-xs bg-red-100 text-red-600 hover:bg-red-200 px-2 py-1 rounded font-bold transition flex items-center gap-1">🗑 Hapus ({Object.values(checkedRiwayat).filter(Boolean).length})</button>
                                </>
                              )}
                            </div>
                          </div>
                          <div className="space-y-1.5 max-h-48 overflow-y-auto">
                            {localRiwayat.map((r, i) => (
                              <div key={i} className={`text-xs rounded px-2.5 py-1.5 border flex items-start gap-2 transition ${r.selesai ? 'bg-green-50 border-green-200' : checkedRiwayat[i] ? 'bg-red-50 border-red-200 opacity-60' : 'bg-white border-orange-100'}`}>
                                <input type="checkbox" checked={!!checkedRiwayat[i]} onChange={() => setCheckedRiwayat(prev => ({ ...prev, [i]: !prev[i] }))} className="mt-0.5 w-3.5 h-3.5 flex-shrink-0 cursor-pointer" style={{accentColor: r.selesai ? '#16a34a' : '#ef4444'}}/>
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-center gap-1 flex-wrap">
                                    <span className="flex-shrink-0">{r.selesai ? '✅' : r.status === 'Revisi' ? '🔴' : r.status === 'Ditunda' ? '🟠' : '🔵'}</span>
                                    <span className={`font-bold ${r.selesai ? 'text-green-600' : r.status === 'Revisi' ? 'text-red-600' : r.status === 'Ditunda' ? 'text-orange-600' : 'text-blue-600'}`}>[{r.status} — {r.tanggal}]</span>
                                    {r.selesai && <span className="bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full text-xs font-bold">✓ Selesai</span>}
                                  </div>
                                  {editingRiwayatIdx === i ? (
                                    <div className="mt-1 flex gap-1.5 items-center">
                                      <input type="text" value={editingRiwayatText} onChange={e => setEditingRiwayatText(e.target.value)}
                                        className="flex-1 border border-blue-300 rounded px-2 py-0.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400" autoFocus
                                        onKeyDown={e => { if (e.key === 'Enter') { const updated = localRiwayat.map((item, idx) => idx === i ? { ...item, catatan: editingRiwayatText } : item); setLocalRiwayat(updated); setEditingRiwayatIdx(null); } if (e.key === 'Escape') setEditingRiwayatIdx(null); }}/>
                                      <button onClick={() => { const updated = localRiwayat.map((item, idx) => idx === i ? { ...item, catatan: editingRiwayatText } : item); setLocalRiwayat(updated); setEditingRiwayatIdx(null); }} className="bg-blue-500 text-white px-2 py-0.5 rounded text-xs font-bold hover:bg-blue-600">✓</button>
                                      <button onClick={() => setEditingRiwayatIdx(null)} className="bg-gray-200 text-gray-600 px-2 py-0.5 rounded text-xs hover:bg-gray-300">✕</button>
                                    </div>
                                  ) : (
                                    <span className={`${r.selesai ? 'text-green-600 line-through' : checkedRiwayat[i] ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{r.catatan || '(tanpa catatan)'}</span>
                                  )}
                                </div>
                                {editingRiwayatIdx !== i && !checkedRiwayat[i] && (
                                  <button onClick={() => { setEditingRiwayatIdx(i); setEditingRiwayatText(r.catatan || ''); }} className="flex-shrink-0 text-blue-400 hover:text-blue-600 transition" title="Edit catatan">✏️</button>
                                )}
                              </div>
                            ))}
                          </div>
                          <p className="text-xs text-gray-400 mt-1.5 italic">☑ centang → ✅ Tandai Selesai atau 🗑 Hapus • ✏️ klik untuk edit teks</p>
                        </div>
                      )}
                      <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <label className="block text-xs font-semibold text-gray-600 mb-1">
                          {verdict === 'Siap Cair' ? '📝 Catatan tambahan (opsional):' : '📝 Alasan Revisi/Tunda (wajib diisi):'}
                        </label>
                        <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows="2"
                          className="w-full p-2 border rounded-lg text-sm"
                          placeholder={verdict === 'Siap Cair' ? 'Tulis catatan jika ada...' : 'Tulis alasan revisi/tunda...'}></textarea>
                      </div>
                    </div>
                    <div className="flex justify-end space-x-2 pt-4 border-t">
                      <button onClick={() => setIsModalOpen(false)} className="px-4 py-2 border rounded text-gray-600 font-medium">Batal</button>
                      <button onClick={submitVerification} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold shadow-md">Simpan Perubahan</button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL EDIT */}
              {isEditModalOpen && editingSpj && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-2xl max-w-2xl w-full p-6 shadow-xl max-h-[90vh] overflow-y-auto">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-xl font-bold flex items-center"><IconEdit className="mr-2 text-amber-500" size={24}/> Edit Data SPJ</h3>
                      <button onClick={() => setIsEditModalOpen(false)}><IconXCircle/></button>
                    </div>
                    <form onSubmit={handleSaveEdit} className="space-y-4">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Kecamatan</label>
                          <select required name="kecamatan" value={editingSpj.kecamatan}
                            onChange={(e) => setEditingSpj({...editingSpj, kecamatan: e.target.value, sekolah: ''})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                            <option value="">-- Pilih Kecamatan --</option>
                            {KECAMATAN_LIST.map(kec => <option key={kec} value={kec}>{kec}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Nama Sekolah</label>
                          <select required name="sekolah" value={editingSpj.sekolah}
                            onChange={(e) => setEditingSpj({...editingSpj, sekolah: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                            <option value="">-- Pilih Sekolah --</option>
                            {SEKOLAH_DATA[editingSpj.kecamatan]?.map(sek => <option key={sek} value={sek}>{sek}</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Triwulan Pelaksanaan</label>
                          <select required name="triwulan" value={editingSpj.triwulan}
                            onChange={(e) => setEditingSpj({...editingSpj, triwulan: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                            <option value="Triwulan 1">Triwulan 1 (Jan-Mar)</option>
                            <option value="Triwulan 2">Triwulan 2 (Apr-Jun)</option>
                            <option value="Triwulan 3">Triwulan 3 (Jul-Sep)</option>
                            <option value="Triwulan 4">Triwulan 4 (Okt-Des)</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Nominal (Rp)</label>
                          <input required name="nominal" type="number" value={editingSpj.nominal}
                            onChange={(e) => setEditingSpj({...editingSpj, nominal: e.target.value})}
                            className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500"/>
                        </div>
                      </div>
                      <div className="relative z-20">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Rincian Belanja Singkat</label>
                        <CustomComboBox name="rincian" value={editingSpj.rincian}
                          onChange={(e) => setEditingSpj({...editingSpj, rincian: e.target.value})}
                          options={RINCIAN_OPTIONS}
                          className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" required/>
                      </div>
                      <div className="flex justify-end space-x-2 pt-4 border-t">
                        <button type="button" onClick={() => setIsEditModalOpen(false)} disabled={isLoading}
                          className="px-4 py-2 border rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50">Batal</button>
                        <button type="submit" disabled={isLoading}
                          className={`px-4 py-2 text-white rounded font-bold transition flex items-center ${isLoading ? 'bg-amber-300 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600'}`}>
                          {isLoading ? (
                            <><svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>Menyimpan...</>
                          ) : "Simpan Perubahan"}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* BARU: MODAL PENCAIRAN KE GU */}
              {isCairModalOpen && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-2xl max-w-lg w-full p-6 shadow-xl">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-bold flex items-center text-gray-800"><IconWallet className="mr-2 text-teal-600" size={24}/> Cairkan SPJ ke GU</h3>
                      <button onClick={() => setIsCairModalOpen(false)}><IconXCircle/></button>
                    </div>
                    <p className="text-sm text-gray-500 mb-4"><span className="font-bold text-teal-700">{jumlahTerpilih} SPJ</span> akan ditandai <strong>Sudah Cair</strong> dan dimasukkan ke GU yang Anda pilih.</p>

                    <div className="flex border border-gray-200 rounded-lg overflow-hidden mb-3">
                      <button onClick={() => setGuMode('pilih')} disabled={daftarGuList.length === 0}
                        className={`flex-1 py-2 text-sm font-bold transition ${guMode === 'pilih' ? 'bg-teal-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'} disabled:opacity-40 disabled:cursor-not-allowed`}>
                        GU Sudah Ada
                      </button>
                      <button onClick={() => setGuMode('baru')}
                        className={`flex-1 py-2 text-sm font-bold transition ${guMode === 'baru' ? 'bg-teal-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`}>
                        Buat GU Baru
                      </button>
                    </div>

                    {guMode === 'pilih' ? (
                      <div className="mb-2">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Pilih GU</label>
                        <select value={guPilihan} onChange={(e) => setGuPilihan(e.target.value)}
                          className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm">
                          {daftarGuList.length === 0 && <option value="">-- Belum ada GU --</option>}
                          {daftarGuList.map(g => {
                            const totalG = dataSpj.filter(s => s.status === 'Sudah Cair' && s.gu === g).reduce((a, s) => a + (Number(s.nominal) || 0), 0);
                            const countG = dataSpj.filter(s => s.status === 'Sudah Cair' && s.gu === g).length;
                            return <option key={g} value={g}>{g} ({countG} SPJ — {formatRupiah(totalG)})</option>;
                          })}
                        </select>
                      </div>
                    ) : (
                      <div className="mb-2">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Nama/Nomor GU Baru</label>
                        <input type="text" value={guBaruText} onChange={(e) => setGuBaruText(e.target.value)}
                          className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm"
                          placeholder="Misal: GU 1 atau GU-01/2026"/>
                        <p className="text-xs text-gray-400 mt-1">Saran otomatis: <button type="button" onClick={() => setGuBaruText(saranGuBaru())} className="text-teal-600 font-semibold hover:underline">{saranGuBaru()}</button></p>
                      </div>
                    )}

                    <div className="mb-2">
                      <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Pencairan</label>
                      <input type="date" value={tanggalCairInput} onChange={(e) => setTanggalCairInput(e.target.value)}
                        className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm"/>
                    </div>

                    <div className="mt-4 p-3 bg-gray-50 rounded-lg border border-gray-200 max-h-40 overflow-y-auto">
                      <p className="text-xs font-bold text-gray-500 mb-1.5">SPJ yang akan dicairkan:</p>
                      {dataSpj.filter(s => selectedForCair[s.id]).map(s => (
                        <div key={s.id} className="text-xs text-gray-600 flex justify-between py-0.5">
                          <span>{s.id} — {s.sekolah}</span>
                          <span className="font-semibold">{formatRupiah(s.nominal)}</span>
                        </div>
                      ))}
                    </div>

                    <div className="flex justify-end space-x-2 pt-4 mt-2 border-t">
                      <button onClick={() => setIsCairModalOpen(false)} className="px-4 py-2 border rounded text-gray-600 font-medium">Batal</button>
                      <button onClick={submitPencairan} disabled={isLoading}
                        className={`px-6 py-2 text-white rounded font-bold shadow-md transition ${isLoading ? 'bg-teal-300 cursor-not-allowed' : 'bg-teal-600 hover:bg-teal-700'}`}>
                        {isLoading ? 'Memproses...' : 'Konfirmasi Pencairan'}
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App/>);
    </script>
</body>
</html>
