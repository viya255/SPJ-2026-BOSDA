  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 2. Fungsi simpan (kode asli dipertahankan)
  function simpanData() {
    const nama = document.getElementById("inputNamaSekolah").value;
    const nominal = document.getElementById("inputAnggaran").value;

    db.collection("data_spj").add({
      sekolah: nama,
      anggaran: parseInt(nominal),
      tanggal: new Date().toISOString()
    })
    .then(() => {
      alert("Data berhasil tersimpan!");
      tampilkanDataKeTabel();
    });
  }

  // 3. Fungsi tampil (kode asli dipertahankan)
  function tampilkanDataKeTabel() {
    const tbody = document.getElementById("tabelBody");
    db.collection("data_spj").get().then((querySnapshot) => {
      tbody.innerHTML = ""; 
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        tbody.innerHTML += `<tr><td class="border p-2">${data.sekolah}</td><td class="border p-2">${data.anggaran}</td></tr>`;
      });
    });
  }

  // 4. Jalankan saat halaman dibuka (kode asli dipertahankan)
  window.onload = tampilkanDataKeTabel;

    function getSchoolNumber(name) {
        if (!name) return null;
        const m = name.match(/\b(\d+)\b/);
        return m ? m[1] : null;
    }

    function getPaguInfo(sekolah, rincian, triwulan) {
        const num = getSchoolNumber(sekolah);
        if (!num || !RAK_DATA[num]) return null;
        const kode = rincian.split(' ')[0];
        if (!RAK_DATA[num][kode]) return null;
        const twNum = triwulan.replace('Triwulan ', '');
        return {
            total: RAK_DATA[num][kode]['t'] || 0,
            triwulan: RAK_DATA[num][kode][twNum] || 0,
            kode: kode
        };
    }

    // ================================================================
    // TAMBAHAN BARU: Global cache rakData untuk support sekolah 16-389
    // Kode asli getPaguInfo di atas TIDAK DIUBAH
    // ================================================================
    window.rakDataGlobal = [];

    function getPaguInfoEnhanced(sekolah, rincian, triwulan) {
        // Coba dulu via RAK_DATA asli (sekolah 1-15)
        const fromOriginal = getPaguInfo(sekolah, rincian, triwulan);
        if (fromOriginal) return fromOriginal;

        // Fallback: cari dari rakDataGlobal (data SheetBest, sekolah 16-389)
        if (!window.rakDataGlobal || window.rakDataGlobal.length === 0) return null;
        const num = getSchoolNumber(sekolah);
        if (!num) return null;

        const schoolData = window.rakDataGlobal.find(s => String(s.no) === String(num));
        if (!schoolData) return null;

        const kode = rincian.split(' ')[0];
        // Normalisasi kode: cari rincian yang kodenya cocok
        const rincianItem = schoolData.rincian.find(r => {
            // Cocokkan kode dengan berbagai format
            const rKode = r.kode || '';
            // Ambil suffix angka untuk perbandingan
            const rSuffix = rKode.replace('5.1.02.01.01.', '').replace(/^0+/, '');
            const kSuffix = kode.replace('5.1.02.01.01.', '').replace(/^0+/, '');
            return rKode === kode || rSuffix === kSuffix;
        });

        if (!rincianItem) return null;

        const twNum = triwulan.replace('Triwulan ', '');
        const twKey = `tw${twNum}`;
        return {
            total: rincianItem.paguTotal || 0,
            triwulan: rincianItem[twKey] || 0,
            kode: kode
        };
    }

          // SELESAI TAMBAHAN: Sync rakData ke window.rakDataGlobal
          // ================================================================

          const parseNominal = (val) => {
            if (!val || val === '-' || val === '') return 0;

            return Math.round(parseFloat(cleaned) || 0);

          const fetchRakData = async () => {
            setRakLoading(true);
            try {
              const response = await fetch('https://api.sheetbest.com/sheets/cfa7def0-feb9-4828-bb0f-e237c95d4dc4');

              rawData.forEach(row => {

                const apr = row['7']; const mei = row['8']; const jun = row['9'];

                  else if (sNo >= 16 && sNo <= 35) kecamatan = 'Kebomas';
                  else if (sNo >= 36 && sNo <= 51) kecamatan = 'Manyar';
                  else if (sNo >= 52 && sNo <= 76) kecamatan = 'Cerme';
                  else if (sNo >= 77 && sNo <= 92) kecamatan = 'Duduksampeyan';
                  else if (sNo >= 93 && sNo <= 117) kecamatan = 'Benjeng';
                  else if (sNo >= 118 && sNo <= 143) kecamatan = 'Balongpanggang';
                  else if (sNo >= 144 && sNo <= 169) kecamatan = 'Driyorejo';
                  else if (sNo >= 170 && sNo <= 192) kecamatan = 'Wringinanom';
                  else if (sNo >= 193 && sNo <= 213) kecamatan = 'Kedamean';
                  else if (sNo >= 214 && sNo <= 239) kecamatan = 'Menganti';
                  else if (sNo >= 240 && sNo <= 258) kecamatan = 'Bungah';
                  else if (sNo >= 259 && sNo <= 272) kecamatan = 'Sidayu';
                  else if (sNo >= 273 && sNo <= 292) kecamatan = 'Dukun';
                  else if (sNo >= 293 && sNo <= 308) kecamatan = 'Ujungpangkah';
                  else if (sNo >= 309 && sNo <= 324) kecamatan = 'Panceng';
                  else if (sNo >= 325 && sNo <= 360) kecamatan = 'Sangkapura';

                    namaAsli: nama,

                    namaUpt: `UPT SDN ${sNo} GRESIK`,
                    kecamatan: kecamatan,

                    tw2: parseNominal(apr) + parseNominal(mei) + parseNominal(jun),
                    tw3: parseNominal(jul) + parseNominal(agu) + parseNominal(sep),
                    tw4: parseNominal(okt) + parseNominal(nov) + parseNominal(des),

                    tw3: parseNominal(jul) + parseNominal(agu) + parseNominal(sep),
                    tw4: parseNominal(okt) + parseNominal(nov) + parseNominal(des),

                      {isDraggable && <td className="p-4 text-gray-400"><IconGripVertical size={18}/></td>}
                      <td className="p-4 font-medium text-gray-800">{spj.id}<br/><span className="text-xs text-gray-500 font-normal flex items-center mt-1"><IconClock size={12} className="mr-1"/>{spj.tanggal}</span></td>
                      <td className="p-4 font-medium text-gray-800">{spj.sekolah}<br/><span className="text-xs text-gray-500 font-normal flex items-center mt-1"><IconMapPin size={12} className="mr-1"/> Kec. {spj.kecamatan} (PIC: {spj.pic}) • {spj.triwulan}</span></td>
                      <td className="p-4 max-w-xs"><div className="font-bold text-blue-700">{formatRupiah(spj.nominal)}</div><div className="text-xs text-gray-500 truncate mt-1" title={spj.rincian}>{spj.rincian}</div></td>
                      <td className="p-4">
                        <span className={`px-2 py-1 rounded-full text-xs font-medium ${spj.status === 'Siap Cair' ? 'bg-green-100 text-green-800' : spj.status === 'Revisi' ? 'bg-red-100 text-red-800' : spj.status === 'Menunggu Verifikasi' ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800'}`}>{spj.status}</span>
                        {spj.catatan && <div className="text-xs text-red-500 mt-1 max-w-[150px]">{spj.catatan}</div>}
                      </td>
                      <td className="p-4 text-right">
                        {requiresPicLock && currentPic !== spj.pic ? (
                          <span className="text-xs font-semibold text-gray-500 italic bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-200 inline-block text-center w-full">Aksi Terkunci</span>
                        ) : (
                          <div className="flex justify-end space-x-1.5 flex-wrap gap-y-1">
                            {showVerifyAction && <button onClick={() => openVerifyModal(spj)} className="bg-blue-50 text-blue-600 hover:bg-blue-100 px-2 py-1.5 rounded text-xs font-bold inline-flex items-center transition"><IconClipboardCheck size={14} className="mr-1 hidden sm:block"/> Koreksi</button>}
                            <button onClick={() => handleOpenEdit(spj)} className="bg-amber-50 text-amber-600 hover:bg-amber-100 px-2 py-1.5 rounded text-xs font-bold inline-flex items-center transition"><IconEdit size={14} className="mr-1 hidden sm:block"/> Edit</button>
                            <button onClick={() => handleDeleteSpj(spj.id)} className="bg-red-50 text-red-600 hover:bg-red-100 px-2 py-1.5 rounded text-xs font-bold inline-flex items-center transition"><IconTrash size={14} className="mr-1 hidden sm:block"/> Hapus</button>
                          </div>

                    </tr>

                </tbody>
              </table>
            </div>
          );

          // ============================================================
          // TAMBAHAN: renderRakBosda — Halaman RAK BOSDA 2026
          // ============================================================
          const renderRakBosda = () => {
            // Hitung total diajukan per sekolah dari dataSpj
            const getSpjDiajukan = (uptName) => {
              return dataSpj
                .filter(s => s.sekolah === uptName && (s.status === 'Menunggu Verifikasi' || s.status === 'Siap Cair'))
                .reduce((acc, s) => acc + (Number(s.nominal) || 0), 0);
            };

            // ================================================================
            // TAMBAHAN BARU: Helper hitung SPJ diajukan per rincian per sekolah
            // ================================================================
            const getSpjDiajukanPerRincian = (uptName, kodeRincian, triwulan) => {
              return dataSpj
                .filter(s => {
                  const sKode = s.rincian ? s.rincian.split(' ')[0] : '';
                  // Normalisasi kode untuk perbandingan
                  const normSKode = sKode.replace('5.1.02.01.01.', '').replace(/^0+/, '');
                  const normKode = kodeRincian.replace('5.1.02.01.01.', '').replace(/^0+/, '');
                  return s.sekolah === uptName
                    && (normSKode === normKode || sKode === kodeRincian)
                    && (s.status === 'Menunggu Verifikasi' || s.status === 'Siap Cair');
                })
                .reduce((acc, s) => acc + (Number(s.nominal) || 0), 0);
            };
            // ================================================================
            // SELESAI TAMBAHAN helper getSpjDiajukanPerRincian
            // ================================================================

            // Filter data
            let filtered = rakData.filter(s => {
              const matchSearch = rakSearch === '' ||
                s.namaDisplay.toLowerCase().includes(rakSearch.toLowerCase()) ||
                s.kecamatan.toLowerCase().includes(rakSearch.toLowerCase()) ||
                String(s.no).includes(rakSearch);
              const matchKec = rakFilterKec === 'Semua Kecamatan' || s.kecamatan === rakFilterKec;
              let matchTw = true;
              // Filter triwulan: tampilkan sekolah yg punya pagu di TW tsb
              if (rakFilterTw !== 'Semua Triwulan') {
                const twKey = rakFilterTw.replace('Triwulan ', 'tw');
                matchTw = s[twKey] > 0;
              }
              return matchSearch && matchKec && matchTw;
            });

            const totalPagu = filtered.reduce((a, s) => a + s.paguTotal, 0);
            const totalDiajukan = filtered.reduce((a, s) => a + getSpjDiajukan(s.namaUpt), 0);
            const totalSisa = totalPagu - totalDiajukan;

            const openDetail = (sekolah) => {
              setRakDetailSekolah(sekolah);
              setRakDetailOpen(true);
            };

            return (
              <div className="space-y-4">

                <div className="flex items-center justify-between">

                    <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <IconTable size={24} className="text-green-600"/> RAK BOS 2026
                    </h2>
                    <p className="text-sm text-gray-500 mt-0.5">Rencana Anggaran Kegiatan — {filtered.length} dari {rakData.length} sekolah</p>
                  </div>
                  <button onClick={() => { setRakLoaded(false); fetchRakData(); }}
                    className="text-xs font-bold bg-green-100 text-green-700 px-3 py-2 rounded-lg hover:bg-green-200 transition flex items-center gap-1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    Refresh
                  </button>
                </div>

                {/* Summary Cards */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white border border-gray-100 rounded-xl p-5 shadow-sm">
                    <p className="text-xs text-gray-500 font-medium uppercase tracking-wide">Total Pagu Ditampilkan</p>
                    <p className="text-2xl font-bold text-gray-800 mt-1">{formatRupiah(totalPagu)}</p>
                    <p className="text-xs text-gray-400 mt-1">{filtered.length} sekolah</p>
                  </div>
                  <div className="bg-orange-50 border border-orange-100 rounded-xl p-5 shadow-sm">
                    <p className="text-xs text-orange-600 font-medium uppercase tracking-wide">Sudah Diajukan (SPJ)</p>
                    <p className="text-2xl font-bold text-orange-600 mt-1">{formatRupiah(totalDiajukan)}</p>
                    <p className="text-xs text-orange-400 mt-1">{totalPagu > 0 ? ((totalDiajukan/totalPagu)*100).toFixed(1) : 0}% dari total pagu</p>
                  </div>
                  <div className="bg-green-50 border border-green-100 rounded-xl p-5 shadow-sm">
                    <p className="text-xs text-green-600 font-medium uppercase tracking-wide">Sisa Pagu</p>
                    <p className="text-2xl font-bold text-green-700 mt-1">{formatRupiah(totalSisa)}</p>
                    <p className="text-xs text-green-500 mt-1">{totalPagu > 0 ? ((totalSisa/totalPagu)*100).toFixed(1) : 100}% tersisa</p>
                  </div>
                </div>

                {/* Filter Bar */}
                <div className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm flex flex-col md:flex-row gap-3 items-center">
                  <div className="relative flex-1 w-full">
                    <IconSearch size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
                    <input value={rakSearch} onChange={e => setRakSearch(e.target.value)}
                      className="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-green-400 focus:outline-none"
                      placeholder="Cari nama sekolah atau kecamatan..."/>
                  </div>
                  <select value={rakFilterKec} onChange={e => setRakFilterKec(e.target.value)}
                    className="w-full md:w-48 p-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-green-400 bg-white">
                    <option>Semua Kecamatan</option>
                    {KECAMATAN_LIST.map(k => <option key={k}>{k}</option>)}
                  </select>
                  <select value={rakFilterTw} onChange={e => setRakFilterTw(e.target.value)}
                    className="w-full md:w-44 p-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-green-400 bg-white">
                    <option>Semua Triwulan</option>
                    <option>Triwulan 1</option>
                    <option>Triwulan 2</option>
                    <option>Triwulan 3</option>
                    <option>Triwulan 4</option>
                  </select>
                </div>

                {/* Loading State */}
                {rakLoading && (
                  <div className="flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-gray-100">
                    <svg className="animate-spin h-10 w-10 text-green-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p className="text-green-700 font-semibold">Memuat data RAK BOS 2026...</p>
                    <p className="text-gray-400 text-sm mt-1">Mengambil data 389 sekolah dari server</p>
                  </div>
                )}

                {/* Table */}
                {!rakLoading && (

                            <th className="p-3 font-semibold text-right">Sisa Pagu</th>
                            <th className="p-3 font-semibold text-center">Serapan</th>
                            <th className="p-3 font-semibold text-center">Aksi</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filtered.length === 0 ? (
                            <tr><td colSpan={8} className="p-10 text-center text-gray-400">Tidak ada data sekolah ditemukan.</td></tr>
                          ) : filtered.map((s, idx) => {
                            const diajukan = getSpjDiajukan(s.namaUpt);
                            const sisa = s.paguTotal - diajukan;
                            const serapan = s.paguTotal > 0 ? (diajukan / s.paguTotal) * 100 : 0;
                            return (
                              <tr key={s.no} className={`border-b border-gray-100 hover:bg-green-50 transition-colors ${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}>
                                <td className="p-3 text-center text-gray-500">{idx + 1}</td>
                                <td className="p-3 font-medium text-gray-800">{s.namaDisplay}</td>
                                <td className="p-3">
                                  <span className="text-green-700 font-medium text-xs bg-green-100 px-2 py-0.5 rounded-full">{s.kecamatan}</span>
                                </td>
                                <td className="p-3 text-right font-medium text-gray-800">{formatRupiah(s.paguTotal)}</td>
                                <td className="p-3 text-right font-medium text-orange-600">
                                  {diajukan > 0 ? formatRupiah(diajukan) : <span className="text-gray-300">—</span>}
                                </td>
                                <td className="p-3 text-right font-bold text-green-700">{formatRupiah(sisa)}</td>
                                <td className="p-3">
                                  <div className="flex items-center gap-2">
                                    <div className="flex-1 bg-gray-200 rounded-full h-2 min-w-[60px]">
                                      <div className="bg-green-500 h-2 rounded-full transition-all" style={{width: `${Math.min(100,serapan)}%`}}></div>
                                    </div>
                                    <span className="text-xs text-gray-500 w-8 text-right">{serapan.toFixed(0)}%</span>
                                  </div>
                                </td>
                                <td className="p-3 text-center">
                                  <button onClick={() => openDetail(s)}
                                    className="inline-flex items-center gap-1 bg-green-50 text-green-700 hover:bg-green-100 px-3 py-1.5 rounded-lg text-xs font-bold transition border border-green-200">
                                    <IconEye size={13}/> Detail
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                        {filtered.length > 0 && (
                          <tfoot>
                            <tr className="bg-gray-100 border-t-2 border-gray-300 font-bold text-sm">
                              <td colSpan={3} className="p-3 text-gray-700">Total ({filtered.length} Sekolah)</td>
                              <td className="p-3 text-right text-gray-800">{formatRupiah(totalPagu)}</td>
                              <td className="p-3 text-right text-orange-600">{formatRupiah(totalDiajukan)}</td>
                              <td className="p-3 text-right text-green-700">{formatRupiah(totalSisa)}</td>
                              <td colSpan={2} className="p-3 text-center text-gray-500 text-xs">
                                Serapan: {totalPagu > 0 ? ((totalDiajukan/totalPagu)*100).toFixed(1) : 0}%
                              </td>
                            </tr>
                          </tfoot>
                        )}
                      </table>
                    </div>
                  </div>
                )}

                {/* MODAL DETAIL SEKOLAH */}
                {rakDetailOpen && rakDetailSekolah && (
                  <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl w-full max-w-5xl shadow-2xl flex flex-col max-h-[92vh]">
                      {/* Modal Header */}
                      <div className="flex justify-between items-start p-5 border-b bg-green-600 rounded-t-2xl">
                        <div>
                          <h3 className="text-lg font-bold text-white flex items-center gap-2">
                            <IconTable size={20}/> {rakDetailSekolah.namaDisplay}
                          </h3>
                          <p className="text-green-100 text-sm mt-0.5">{rakDetailSekolah.namaAsli}</p>
                          <p className="text-green-200 text-xs mt-1">Kecamatan {rakDetailSekolah.kecamatan} • Pagu Total: {formatRupiah(rakDetailSekolah.paguTotal)}</p>
                        </div>
                        <button onClick={() => setRakDetailOpen(false)} className="text-white hover:text-green-200 transition">
                          <IconXCircle size={24}/>
                        </button>
                      </div>

                      {/* Ringkasan TW */}
                      <div className="p-4 grid grid-cols-2 md:grid-cols-4 gap-3 border-b bg-gray-50">
                        {[1,2,3,4].map(tw => {
                          const twKey = `tw${tw}`;
                          const twLabels = {1:'TW 1 (Jan-Mar)',2:'TW 2 (Apr-Jun)',3:'TW 3 (Jul-Sep)',4:'TW 4 (Okt-Des)'};
                          const diajukanTw = dataSpj
                            .filter(s => s.sekolah === rakDetailSekolah.namaUpt && s.triwulan === `Triwulan ${tw}` && (s.status === 'Menunggu Verifikasi' || s.status === 'Siap Cair'))
                            .reduce((a, s) => a + (Number(s.nominal)||0), 0);
                          const paguTw = rakDetailSekolah[twKey] || 0;
                          const sisaTw = paguTw - diajukanTw;
                          return (
                            <div key={tw} className={`rounded-xl p-3 border ${paguTw === 0 ? 'bg-gray-100 border-gray-200' : 'bg-white border-green-200'}`}>
                              <p className="text-xs font-bold text-gray-600">{twLabels[tw]}</p>
                              <p className={`text-sm font-bold mt-1 ${paguTw === 0 ? 'text-gray-400' : 'text-green-700'}`}>
                                {paguTw === 0 ? 'Tidak ada pagu' : formatRupiah(paguTw)}
                              </p>
                              {paguTw > 0 && (
                                <p className={`text-xs mt-0.5 ${diajukanTw > 0 ? 'text-orange-500' : 'text-gray-400'}`}>
                                  Diajukan: {diajukanTw > 0 ? formatRupiah(diajukanTw) : '—'}
                                </p>
                              )}
                              {paguTw > 0 && (
                                <p className={`text-xs font-semibold ${sisaTw < 0 ? 'text-red-600' : 'text-green-600'}`}>
                                  Sisa: {formatRupiah(Math.max(0, sisaTw))}
                                </p>
                              )}
                            </div>
                          );
                        })}
                      </div>

                      {/* Tabel Detail Rincian */}
                      <div className="overflow-y-auto flex-1 p-4">
                        <h4 className="font-bold text-gray-700 mb-3 text-sm flex items-center gap-1">
                          <IconFileText size={15}/> Detail Rincian Belanja & Pagu Per Triwulan
                        </h4>
                        {rakDetailSekolah.rincian.length === 0 ? (
                          <p className="text-gray-400 text-sm italic text-center py-8">Tidak ada data rincian untuk sekolah ini.</p>
                        ) : (
                          <div className="overflow-x-auto rounded-xl border border-gray-200">
                            <table className="w-full text-xs border-collapse">
                              <thead>
                                <tr className="bg-gray-100 text-gray-600">
                                  <th className="p-2.5 text-left font-semibold min-w-[200px]">Rincian Belanja</th>
                                  <th className="p-2.5 text-right font-semibold">Pagu Total</th>
                                  {/* TAMBAHAN BARU: Kolom Diajukan & Sisa per rincian */}
                                  <th className="p-2.5 text-right font-semibold bg-orange-50 text-orange-700">Diajukan</th>
                                  <th className="p-2.5 text-right font-semibold bg-teal-50 text-teal-700">Sisa Pagu</th>
                                  {/* SELESAI TAMBAHAN kolom */}
                                  <th className="p-2.5 text-center font-semibold bg-blue-50 text-blue-700" colSpan={3}>TW 1 (Jan-Mar)</th>
                                  <th className="p-2.5 text-center font-semibold bg-yellow-50 text-yellow-700" colSpan={3}>TW 2 (Apr-Jun)</th>
                                  <th className="p-2.5 text-center font-semibold bg-green-50 text-green-700" colSpan={3}>TW 3 (Jul-Sep)</th>
                                  <th className="p-2.5 text-center font-semibold bg-purple-50 text-purple-700" colSpan={3}>TW 4 (Okt-Des)</th>
                                </tr>
                                <tr className="bg-gray-50 text-gray-500 text-xs">
                                  <th className="p-2 text-left"></th>
                                  <th className="p-2 text-right"></th>
                                  {/* TAMBAHAN BARU: subheader kosong untuk kolom baru */}
                                  <th className="p-2 text-right bg-orange-50"></th>
                                  <th className="p-2 text-right bg-teal-50"></th>
                                  {/* SELESAI TAMBAHAN */}
                                  <th className="p-2 text-right bg-blue-50">Jan</th><th className="p-2 text-right bg-blue-50">Feb</th><th className="p-2 text-right font-bold bg-blue-100 text-blue-700">Mar</th>
                                  <th className="p-2 text-right bg-yellow-50">Apr</th><th className="p-2 text-right bg-yellow-50">Mei</th><th className="p-2 text-right font-bold bg-yellow-100 text-yellow-700">Jun</th>
                                  <th className="p-2 text-right bg-green-50">Jul</th><th className="p-2 text-right bg-green-50">Agu</th><th className="p-2 text-right font-bold bg-green-100 text-green-700">Sep</th>
                                  <th className="p-2 text-right bg-purple-50">Okt</th><th className="p-2 text-right bg-purple-50">Nov</th><th className="p-2 text-right font-bold bg-purple-100 text-purple-700">Des</th>
                                </tr>
                              </thead>
                              <tbody>
                                {rakDetailSekolah.rincian.map((r, idx) => {

                                    <td className="p-2.5">

                        <button type="button" onClick={() => setIsEditModalOpen(false)} disabled={isLoading}
                          className="px-4 py-2 border rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50">Batal</button>
                        <button type="submit" disabled={isLoading}
                          className={`px-4 py-2 text-white rounded font-bold transition flex items-center ${isLoading ? 'bg-amber-300 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600'}`}>
                          {isLoading ? (
                            <><svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>Menyimpan...</>
                          ) : "Simpan Perubahan"}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App/>);
    </script>
</body>
</html>
